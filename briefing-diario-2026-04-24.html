<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Briefing Diario · 2026-04-24</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1419;--bg-alt:#161c25;--card:#1c2431;--card-2:#222c3c;
  --border:#2a3547;--text:#e8ecf1;--muted:#8b95a7;--accent:#4a9eff;
  --alta:#ff5a5f;--media:#f2b94b;--baja:#6ecf68;--link:#6fb3ff;
  --shadow:0 4px 24px rgba(0,0,0,.25);
}
@media (prefers-color-scheme:light){
  :root{--bg:#f5f7fa;--bg-alt:#ecf0f6;--card:#ffffff;--card-2:#f9fafc;
  --border:#e2e8f0;--text:#1a202c;--muted:#64748b;--accent:#2563eb;
  --link:#1d4ed8;--shadow:0 2px 12px rgba(15,23,42,.08);}
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;line-height:1.55;font-size:15px;min-height:100vh}
.gate{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
.gate-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:40px 32px;box-shadow:var(--shadow);width:100%;max-width:380px;text-align:center}
.gate-card h1{font-size:26px;font-weight:700;margin-bottom:6px;letter-spacing:-.5px}
.gate-card p.sub{color:var(--muted);font-size:14px;margin-bottom:24px}
.gate-card input{width:100%;padding:12px 14px;background:var(--bg-alt);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:15px;outline:none;transition:border-color .15s}
.gate-card input:focus{border-color:var(--accent)}
.gate-card button{width:100%;margin-top:12px;padding:12px;background:var(--accent);color:white;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;transition:opacity .15s}
.gate-card button:hover{opacity:.9}
.gate-card .err{color:var(--alta);font-size:13px;margin-top:10px;min-height:18px}
.wrap{max-width:1080px;margin:0 auto;padding:24px 20px}
.hero{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:14px;margin-bottom:22px;padding-bottom:18px;border-bottom:1px solid var(--border)}
.brand h1{font-size:30px;font-weight:700;letter-spacing:-.5px}
.brand .sub{color:var(--muted);font-size:14px;margin-top:4px}
.weather-chip{display:inline-flex;flex-direction:column;align-items:flex-end;padding:10px 16px;background:var(--card);border:1px solid var(--border);border-radius:10px}
.weather-chip .temp{font-weight:700;font-size:20px;color:var(--accent)}
.weather-chip .cond{font-size:12px;color:var(--muted)}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:22px;margin-bottom:18px;box-shadow:var(--shadow)}
.card h2{font-size:20px;font-weight:700;margin-bottom:14px;letter-spacing:-.3px}
.card h3{font-size:14px;font-weight:600;margin:14px 0 8px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
.card h3.tag{display:inline-block;padding:4px 10px;border-radius:12px;font-size:11px;color:white}
.card h3.tag.urgent{background:var(--alta)}
.card h3.tag.important{background:var(--media);color:#1a202c}
.card h3.tag.pending{background:var(--baja);color:#1a202c}
.exec ul{list-style:none;padding:0}
.exec ul li{padding:7px 0;padding-left:18px;position:relative;border-bottom:1px dashed var(--border)}
.exec ul li:last-child{border-bottom:none}
.exec ul li:before{content:"▸";position:absolute;left:0;color:var(--accent)}
.mail{background:var(--card-2);border-left:3px solid var(--border);border-radius:6px;padding:14px 16px;margin-bottom:12px}
.mail.prio-alta{border-left-color:var(--alta)}
.mail.prio-media{border-left-color:var(--media)}
.mail.prio-baja{border-left-color:var(--baja)}
.mail-head{display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;font-size:12px;color:var(--muted);margin-bottom:4px}
.mail .from{font-weight:500}
.mail .subj{font-weight:600;font-size:15px;margin-bottom:6px}
.mail .sum{font-size:14px;line-height:1.55;margin-bottom:10px}
.mail .action{font-size:13px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.chip{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.chip.alta{background:var(--alta);color:white}
.chip.media{background:var(--media);color:#1a202c}
.chip.baja{background:var(--baja);color:#1a202c}
details{margin-top:10px;background:var(--bg-alt);border-radius:6px;padding:8px 12px;font-size:13px}
summary{cursor:pointer;color:var(--link);font-size:13px;font-weight:500}
details blockquote{margin:8px 0;padding:10px;border-left:3px solid var(--accent);background:var(--card);font-style:italic;font-size:13px}
details .quick{margin-top:6px;font-size:12px;color:var(--muted)}
.note{background:var(--bg-alt);border-left:3px solid var(--media);padding:10px 14px;border-radius:6px;font-size:13px;margin-top:10px;color:var(--muted)}
.cal{width:100%;border-collapse:collapse;margin:10px 0;font-size:14px}
.cal th,.cal td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--border)}
.cal th{font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:600}
.cal tr.priority{background:rgba(74,158,255,.08)}
.grid.two{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:16px}
@media(max-width:640px){.grid.two{grid-template-columns:1fr}}
.grid.two h3{margin-top:0}
.grid.two ul,.grid.two ol{padding-left:18px;font-size:14px}
.schedule{list-style:none;padding:0}
.schedule li{padding:6px 0;border-bottom:1px dashed var(--border);font-size:14px}
.schedule li:last-child{border-bottom:none}
.schedule li span{display:inline-block;width:60px;font-weight:600;color:var(--accent)}
.news-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:640px){.news-grid{grid-template-columns:1fr}}
.news-grid article{background:var(--card-2);border-radius:8px;padding:14px}
.news-grid article h3{margin-top:0;color:var(--accent);font-size:13px}
.news-grid ul{padding-left:18px;font-size:13px;line-height:1.6}
.news-grid ul li{margin-bottom:6px}
.news-grid a,.src a{color:var(--link);text-decoration:none}
.news-grid a:hover,.src a:hover{text-decoration:underline}
.impact{margin-top:14px;padding:12px 14px;background:var(--bg-alt);border-radius:8px;border-left:3px solid var(--accent);font-size:13px}
.weather-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:14px 0}
@media(max-width:640px){.weather-grid{grid-template-columns:repeat(2,1fr)}}
.weather-grid div{background:var(--card-2);padding:14px;border-radius:8px;text-align:center}
.weather-grid .big{display:block;font-size:22px;font-weight:700;color:var(--accent)}
.weather-grid .lbl{display:block;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:4px}
.weather p{font-size:14px;margin-top:6px}
.src{font-size:12px;color:var(--muted);margin-top:10px}
.tasks ol{padding-left:22px}
.tasks li{padding:6px 0;font-size:14px}
.prio{display:inline-block;font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-right:8px;vertical-align:middle}
.prio.alta{background:var(--alta);color:white}
.prio.media{background:var(--media);color:#1a202c}
.prio.baja{background:var(--baja);color:#1a202c}
.foot{text-align:center;padding:24px 0;color:var(--muted);font-size:12px}
.foot .unav{margin-top:4px;opacity:.8}
#app{display:none}
</style>
</head>

</div>

function unlock(){
  var pw=document.getElementById('pw').value;
  var err=document.getElementById('err');
  err.textContent='';
  try{
    var decrypted=CryptoJS.AES.decrypt(PAYLOAD,pw,{format:CryptoJS.format.OpenSSL}).toString(CryptoJS.enc.Utf8);
    if(!decrypted){throw new Error('bad');}
    document.getElementById('gate').style.display='none';
    var app=document.getElementById('app');
    app.innerHTML=decrypted;
    app.style.display='block';
  }catch(e){
    err.textContent='Contraseña incorrecta';
  }
}
document.getElementById('btn').addEventListener('click',unlock);
document.getElementById('pw').addEventListener('keydown',function(e){if(e.key==='Enter')unlock();});
