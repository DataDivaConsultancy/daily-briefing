<\!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Briefing Diario</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
<style>
:root{--bg:#f5f5f7;--card:#fff;--text:#1d1d1f;--muted:#6e6e73;--accent:#0071e3;--red:#ff3b30;--orange:#ff9500;--green:#34c759;--blue:#007aff;--border:#e5e5ea;--shadow:0 1px 3px rgba(0,0,0,.08)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.5}
.container{max-width:900px;margin:0 auto;padding:24px 16px}
header{text-align:center;padding:32px 0 24px}
header h1{font-size:28px;font-weight:700;letter-spacing:-.5px}
header p{color:var(--muted);font-size:14px;margin-top:4px}
.card{background:var(--card);border-radius:12px;box-shadow:var(--shadow);padding:20px 24px;margin-bottom:16px}
.card h2{font-size:18px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.section-icon{width:24px;height:24px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;font-size:14px;color:#fff;flex-shrink:0}
.alert-banner{background:linear-gradient(135deg,#ff3b30,#ff6961);color:#fff;border-radius:12px;padding:16px 24px;margin-bottom:16px}
.alert-banner h3{font-size:16px;font-weight:700;margin-bottom:4px}
.alert-banner p{font-size:14px;opacity:.95}
.priority-high{border-left:4px solid var(--red)}
.priority-medium{border-left:4px solid var(--orange)}
.priority-low{border-left:4px solid var(--green)}
.badge{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px;text-transform:uppercase}
.badge-alta{background:#ffebee;color:#c62828}
.badge-media{background:#fff3e0;color:#e65100}
.badge-baja{background:#e8f5e9;color:#2e7d32}
.email-item{padding:12px 0;border-bottom:1px solid var(--border)}
.email-item:last-child{border-bottom:none}
.email-sender{font-weight:600;font-size:14px}
.email-subject{font-size:14px;color:var(--text);margin:2px 0}
.email-meta{font-size:12px;color:var(--muted)}
.email-summary{font-size:13px;color:#444;margin-top:4px}
.email-action{font-size:12px;color:var(--accent);font-weight:500;margin-top:4px}
.news-item{padding:10px 0;border-bottom:1px solid var(--border)}
.news-item:last-child{border-bottom:none}
.news-section{font-size:11px;font-weight:600;text-transform:uppercase;color:var(--accent);margin-bottom:2px}
.news-headline{font-weight:600;font-size:14px}
.news-summary{font-size:13px;color:#444;margin-top:2px}
.weather-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;text-align:center}
.weather-stat{padding:12px;background:var(--bg);border-radius:8px}
.weather-stat .value{font-size:24px;font-weight:700}
.weather-stat .label{font-size:12px;color:var(--muted)}
.task-list{list-style:none}
.task-list li{padding:8px 0;border-bottom:1px solid var(--border);font-size:14px;display:flex;align-items:flex-start;gap:8px}
.task-list li:last-child{border-bottom:none}
.task-num{background:var(--accent);color:#fff;width:22px;height:22px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.summary-list{list-style:none}
.summary-list li{padding:6px 0;font-size:14px;border-bottom:1px solid var(--border)}
.summary-list li:last-child{border-bottom:none}
.unavailable{background:#fafafa;border-radius:8px;padding:12px 16px;margin-top:8px}
.unavailable p{font-size:13px;color:var(--muted)}
.agenda-note{background:var(--bg);border-radius:8px;padding:12px 16px;font-size:13px;color:var(--muted)}
footer{text-align:center;padding:24px 0;color:var(--muted);font-size:12px}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
@media(max-width:600px){.container{padding:12px 8px}.card{padding:16px}header h1{font-size:22px}.weather-grid{grid-template-columns:repeat(2,1fr)}}
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1d1d1f 0%,#2c2c2e 100%)}
.login-box{background:#fff;border-radius:16px;padding:48px 40px;max-width:400px;width:90%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-box h1{font-size:24px;font-weight:700;margin-bottom:8px;color:#1d1d1f}
.login-box p{font-size:14px;color:#6e6e73;margin-bottom:24px}
.login-box input[type="password"]{width:100%;padding:14px 16px;border:2px solid #e5e5ea;border-radius:10px;font-size:16px;outline:none;transition:border-color .2s}
.login-box input[type="password"]:focus{border-color:#0071e3}
.login-box button{width:100%;padding:14px;background:#0071e3;color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;margin-top:16px;transition:background .2s}
.login-box button:hover{background:#0062cc}
.login-error{color:#ff3b30;font-size:13px;margin-top:12px;display:none}
.login-logo{width:64px;height:64px;background:linear-gradient(135deg,#0071e3,#00c7be);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:28px;color:#fff;font-weight:700}
</style>
</head>
<body>
<div id="login-screen" class="login-screen">
<div class="login-box">
<div class="login-logo">HB</div>
<h1>Briefing Diario</h1>
<p>Introduce la contraseña para acceder</p>
<input type="password" id="pwd" placeholder="Contraseña" onkeydown="if(event.key==='Enter')decrypt()">
<button onclick="decrypt()">Acceder</button>
<div class="login-error" id="error-msg">Contraseña incorrecta</div>
</div>
</div>
<div id="content" style="display:none"></div>
