<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Briefing Diario · 23 abril 2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
<style>
  :root {
    --bg: #0f1419;
    --card: #1a1f2a;
    --card-hover: #222836;
    --text: #e4e8ef;
    --muted: #8894a6;
    --accent: #6ba4ff;
    --accent-soft: rgba(107, 164, 255, 0.12);
    --success: #4ade80;
    --warn: #f59e0b;
    --danger: #ef4444;
    --border: #2a3040;
    --gradient: linear-gradient(135deg, #6ba4ff 0%, #a78bfa 100%);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    line-height: 1.55;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .login-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: radial-gradient(ellipse at top, #1a2340 0%, #0f1419 55%);
  }
  .login-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 48px 36px;
    max-width: 420px;
    width: 100%;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  .logo { font-size: 32px; font-weight: 700; background: var(--gradient); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; }
  .sub { color: var(--muted); font-size: 13px; margin-bottom: 32px; letter-spacing: 0.5px; }
  .login-box input {
    width: 100%;
    padding: 14px 16px;
    font-size: 15px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    margin-bottom: 14px;
    transition: border 0.2s, box-shadow 0.2s;
  }
  .login-box input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .login-box button {
    width: 100%;
    padding: 14px;
    font-size: 15px;
    font-weight: 600;
    background: var(--gradient);
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.2s;
  }
  .login-box button:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(107, 164, 255, 0.3); }
  .error-msg { color: var(--danger); font-size: 13px; margin-top: 12px; min-height: 18px; }

  .container { max-width: 1100px; margin: 0 auto; padding: 32px 24px 80px; display: none; }

  .hero { display: flex; gap: 24px; align-items: center; justify-content: space-between; flex-wrap: wrap; margin-bottom: 28px; padding-bottom: 22px; border-bottom: 1px solid var(--border); }
  .hero h1 { font-size: 34px; font-weight: 700; background: var(--gradient); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 6px; }
  .subtitle { color: var(--muted); font-size: 15px; }
  .gen { color: var(--muted); font-size: 12px; margin-top: 4px; }
  .weather-card { background: linear-gradient(135deg, rgba(107,164,255,0.12), rgba(167,139,250,0.08)); border: 1px solid var(--border); border-radius: 14px; padding: 16px 22px; min-width: 220px; text-align: right; }
  .weather-temp { font-size: 32px; font-weight: 700; color: var(--accent); line-height: 1; }
  .weather-temp .sep { color: var(--muted); font-weight: 400; margin: 0 6px; }
  .weather-desc { color: var(--text); font-size: 13px; margin-top: 6px; }
  .weather-wind { color: var(--muted); font-size: 12px; margin-top: 3px; }

  .section { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 22px 26px; margin-bottom: 18px; }
  .section h2 { font-size: 17px; margin-bottom: 14px; display: flex; align-items: center; gap: 10px; }
  .section h2::before { content: ''; width: 4px; height: 18px; background: var(--gradient); border-radius: 2px; }

  .summary-list { list-style: none; padding-left: 0; }
  .summary-list li { padding: 6px 0 6px 22px; position: relative; font-size: 14.5px; }
  .summary-list li::before { content: '›'; position: absolute; left: 6px; color: var(--accent); font-weight: 700; }

  .group-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.9px; color: var(--muted); margin: 14px 0 8px; font-weight: 700; }
  .group-title.urgent { color: var(--danger); }
  .group-title.high { color: var(--warn); }
  .group-title.low { color: var(--muted); }
  .email-card { background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-left: 3px solid var(--warn); border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; }
  .email-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; flex-wrap: wrap; gap: 6px; }
  .email-sender { font-weight: 600; font-size: 14px; }
  .email-pill { font-size: 10px; padding: 3px 9px; border-radius: 4px; font-weight: 700; letter-spacing: 0.7px; text-transform: uppercase; }
  .pill-high { background: rgba(245,158,11,0.15); color: var(--warn); }
  .email-subject { color: var(--muted); font-size: 12.5px; margin-bottom: 8px; }
  .email-summary { font-size: 13.5px; margin-bottom: 8px; }
  .email-action { font-size: 13px; color: var(--text); margin-bottom: 8px; }
  details.email-draft { background: rgba(107,164,255,0.04); border-radius: 6px; padding: 8px 12px; margin-top: 4px; }
  details.email-draft summary { cursor: pointer; color: var(--accent); font-size: 13px; font-weight: 500; }
  .draft-body { margin-top: 10px; font-size: 13px; line-height: 1.6; color: #c5ccd8; padding: 8px 0; border-top: 1px solid var(--border); }
  .pending-list { list-style: none; padding-left: 0; }
  .pending-list li { padding: 6px 0 6px 18px; position: relative; font-size: 13.5px; border-bottom: 1px dashed var(--border); }
  .pending-list li:last-child { border-bottom: none; }
  .pending-list li::before { content: '·'; position: absolute; left: 6px; color: var(--muted); font-size: 20px; line-height: 14px; }
  .empty { color: var(--muted); font-size: 13px; font-style: italic; }

  .timeline { margin: 8px 0 16px; }
  .timeline-event { display: flex; gap: 16px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .timeline-event:last-child { border-bottom: none; }
  .time { font-family: 'SF Mono', Menlo, monospace; color: var(--accent); white-space: nowrap; min-width: 120px; font-size: 13px; padding-top: 2px; }
  .event-title { font-weight: 600; font-size: 14.5px; }
  .event-meta { color: var(--muted); font-size: 12.5px; }
  .slots-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 14px; margin-top: 8px; }
  .slot-card { background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; }
  .slot-card h4 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); margin-bottom: 6px; }
  .slot-card ol { padding-left: 20px; font-size: 13px; margin-top: 4px; }
  .slot-card ol li { margin-bottom: 4px; }
  .slot-card p { font-size: 13.5px; }

  .news-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 14px; }
  .news-card { background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
  .news-card h4 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--accent); margin-bottom: 8px; }
  .news-card ul { padding-left: 18px; }
  .news-card li { font-size: 13px; margin-bottom: 5px; }

  .weather-detail { display: flex; gap: 20px; flex-wrap: wrap; }
  .weather-col { min-width: 200px; }
  .kv { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 13.5px; }
  .kv:last-child { border-bottom: none; }
  .kv span { color: var(--muted); }
  .kv b { color: var(--text); }
  .weather-reco { flex: 1; min-width: 220px; background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-left: 3px solid var(--accent); border-radius: 8px; padding: 14px 16px; font-size: 13.5px; font-style: italic; }
  .weather-reco .source { display: block; margin-top: 10px; font-style: normal; color: var(--muted); font-size: 11.5px; }

  .todo-list { padding-left: 24px; }
  .todo-list li { padding: 7px 0; font-size: 14px; border-bottom: 1px solid var(--border); }
  .todo-list li:last-child { border-bottom: none; }
  .todo-list li.pri-high { color: var(--text); }
  .todo-list li.pri-high::marker { color: var(--danger); font-weight: 700; }
  .todo-list li.pri-med::marker { color: var(--warn); font-weight: 700; }
  .todo-list li.pri-low { color: var(--muted); }

  .sources { list-style: none; padding-left: 0; display: flex; flex-wrap: wrap; gap: 10px; }
  .sources li { font-size: 12.5px; }
  .sources a { color: var(--accent); text-decoration: none; background: var(--accent-soft); padding: 4px 10px; border-radius: 6px; }
  .sources a:hover { text-decoration: underline; }

  @media (max-width: 640px) {
    .container { padding: 20px 14px 60px; }
    .section { padding: 16px 16px; border-radius: 12px; }
    .hero h1 { font-size: 26px; }
    .section h2 { font-size: 15px; }
    .weather-card { width: 100%; text-align: left; }
    .time { min-width: 92px; font-size: 12px; }
  }
</style>
</head>
<body>

<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="logo">Briefing Diario</div>
    <div class="sub">ACCESO PRIVADO</div>
    <form id="loginForm" onsubmit="return decryptContent(event)">
      <input type="password" id="passwordInput" placeholder="Contraseña" autocomplete="current-password" required autofocus />
      <button type="submit">Desbloquear</button>
      <div class="error-msg" id="errorMsg"></div>
    </form>
  </div>
</div>

<div class="container" id="contentContainer"></div>

    if (event) event.preventDefault();
    var password = document.getElementById('passwordInput').value;
    var errorMsg = document.getElementById('errorMsg');
    errorMsg.textContent = '';
    try {
      var decrypted = CryptoJS.AES.decrypt(ENCRYPTED_DATA, password);
      var plaintext = decrypted.toString(CryptoJS.enc.Utf8);
      if (!plaintext) throw new Error('bad password');
      document.getElementById('loginScreen').style.display = 'none';
      var container = document.getElementById('contentContainer');
      container.innerHTML = plaintext;
      container.style.display = 'block';
      document.title = 'Briefing Diario · 23 abril 2026';
    } catch (e) {
      errorMsg.textContent = 'Contraseña incorrecta';
      document.getElementById('passwordInput').value = '';
      document.getElementById('passwordInput').focus();
    }
    return false;
  }
