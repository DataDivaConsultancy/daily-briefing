<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Briefing Diario · 2 mayo 2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
<style>
  :root {
    --bg: #f5f6f8;
    --bg-card: #ffffff;
    --text: #1a1f2c;
    --text-muted: #5a6478;
    --accent: #1a3a8a;
    --accent-soft: #e7ecf7;
    --border: #e3e6ed;
    --high: #c0392b;
    --high-soft: #fdecea;
    --medium: #b97300;
    --medium-soft: #fff4e0;
    --low: #6b6f7a;
    --low-soft: #eef0f3;
    --warn: #8b5a00;
    --warn-soft: #fff4d6;
    --green: #2f7d4f;
    --shadow: 0 1px 3px rgba(20,30,60,.06), 0 4px 14px rgba(20,30,60,.05);
    --radius: 10px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }
  .container { max-width: 980px; margin: 0 auto; padding: 32px 22px 80px; }

  /* Lock screen */
  .lock-wrapper {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: linear-gradient(135deg, #1a3a8a 0%, #0e2358 100%);
  }
  .lock-card {
    background: #fff;
    border-radius: 14px;
    padding: 40px 36px;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 20px 60px rgba(0,0,0,.25);
    text-align: center;
  }
  .lock-card .logo { font-size: 42px; margin-bottom: 12px; }
  .lock-card h1 { margin: 0 0 6px; font-size: 22px; color: var(--text); font-weight: 600; letter-spacing: -0.01em; }
  .lock-card .sub { margin: 0 0 26px; color: var(--text-muted); font-size: 13px; }
  .lock-card input[type="password"] {
    width: 100%; padding: 12px 14px; border: 1px solid var(--border);
    border-radius: 8px; font-size: 15px; outline: none;
    transition: border-color .15s ease, box-shadow .15s ease;
  }
  .lock-card input[type="password"]:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .lock-card button {
    width: 100%; margin-top: 12px; padding: 12px 14px;
    background: var(--accent); color: #fff; border: none;
    border-radius: 8px; font-size: 15px; font-weight: 600;
    cursor: pointer; transition: background .15s ease;
  }
  .lock-card button:hover { background: #15306d; }
  .lock-card .err { color: var(--high); font-size: 13px; margin-top: 10px; min-height: 18px; }

  /* Header */
  .header {
    background: linear-gradient(135deg, var(--accent) 0%, #0e2358 100%);
    color: #fff; padding: 28px 26px; border-radius: var(--radius);
    margin-bottom: 26px;
  }
  .header h1 { margin: 0 0 6px; font-size: 26px; font-weight: 600; letter-spacing: -0.01em; }
  .header .date-line { opacity: 0.85; font-size: 14px; }

  /* Sections */
  .section {
    background: var(--bg-card); border-radius: var(--radius);
    padding: 24px 26px; margin-bottom: 22px;
    box-shadow: var(--shadow); border: 1px solid var(--border);
  }
  .section h2 { margin: 0 0 16px; font-size: 19px; font-weight: 600; letter-spacing: -0.01em; }
  .section h3.subsec { margin: 18px 0 10px; font-size: 14px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); font-weight: 600; }
  .section h3.subsec.urgent { color: var(--high); }

  /* Executive summary */
  .exec-list { padding-left: 20px; margin: 0; }
  .exec-list li { margin: 6px 0; }

  /* Email cards */
  .card {
    border: 1px solid var(--border);
    border-left: 4px solid var(--low);
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 12px;
    background: #fcfcfd;
  }
  .card.priority-high { border-left-color: var(--high); background: var(--high-soft); }
  .card.priority-medium { border-left-color: var(--medium); background: var(--medium-soft); }
  .card.priority-low { border-left-color: var(--warn); background: var(--warn-soft); }
  .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .badge { display: inline-block; padding: 2px 9px; border-radius: 999px; font-size: 11px; font-weight: 700; letter-spacing: 0.05em; }
  .badge-high { background: var(--high); color: #fff; }
  .badge-medium { background: var(--medium); color: #fff; }
  .badge-warn { background: var(--warn); color: #fff; }
  .email-date { font-size: 12px; color: var(--text-muted); }
  .email-subject { font-weight: 600; font-size: 15px; margin: 4px 0 2px; }
  .email-from { font-size: 13px; color: var(--text-muted); margin-bottom: 6px; }
  .email-from em { color: var(--text-muted); font-style: italic; }
  .email-summary { margin: 6px 0 8px; font-size: 14px; }
  .action { font-size: 13px; padding: 6px 0; border-top: 1px dashed rgba(0,0,0,.08); }
  .draft-tag { display: inline-block; margin-left: 8px; background: var(--green); color: #fff; padding: 1px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
  details { margin-top: 8px; }
  summary { cursor: pointer; color: var(--accent); font-size: 13px; font-weight: 500; }
  blockquote { margin: 8px 0 4px; padding: 10px 14px; background: rgba(255,255,255,0.6); border-left: 3px solid var(--accent); font-size: 13.5px; font-style: italic; color: var(--text); border-radius: 4px; }
  code { background: rgba(0,0,0,.06); padding: 1px 6px; border-radius: 4px; font-size: 13px; }

  /* Agenda table */
  table.agenda { width: 100%; border-collapse: collapse; margin-bottom: 18px; font-size: 14px; }
  table.agenda th, table.agenda td { padding: 9px 12px; text-align: left; border-bottom: 1px solid var(--border); }
  table.agenda th { background: var(--accent-soft); color: var(--accent); font-weight: 600; font-size: 13px; }
  table.agenda td.free-row { color: var(--text-muted); font-style: italic; text-align: center; }

  .grid-two { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 12px; }
  .info-box { background: var(--accent-soft); border-radius: 8px; padding: 14px 16px; }
  .info-box.info-box-accent { background: linear-gradient(135deg, #fff7e6 0%, #ffe9c2 100%); }
  .info-box h4 { margin: 0 0 8px; font-size: 14px; font-weight: 600; color: var(--accent); }
  .info-box.info-box-accent h4 { color: #8a5a00; }
  .info-box ul, .info-box ol { margin: 0; padding-left: 20px; font-size: 14px; }
  .info-box li { margin: 4px 0; }

  details.proposal { margin-top: 14px; background: var(--bg); padding: 10px 14px; border-radius: 8px; }
  details.proposal summary { font-weight: 600; color: var(--accent); }
  details.proposal ul { margin: 8px 0 0; padding-left: 22px; font-size: 14px; }
  details.proposal li { margin: 4px 0; }

  /* News */
  .news-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .news-block { background: var(--bg); padding: 14px 16px; border-radius: 8px; border: 1px solid var(--border); }
  .news-block h3 { margin: 0 0 8px; font-size: 15px; color: var(--accent); font-weight: 600; }
  .news-block ul { margin: 0; padding-left: 20px; font-size: 13.5px; }
  .news-block li { margin: 5px 0; }
  .news-block em { color: var(--text-muted); font-size: 12px; }

  /* Weather */
  .weather-card { display: flex; gap: 24px; align-items: flex-start; }
  .weather-main { flex: 0 0 auto; text-align: center; padding: 8px 18px; background: var(--accent-soft); border-radius: 10px; }
  .weather-main .temp { display: block; font-size: 28px; font-weight: 700; color: var(--accent); }
  .weather-main .weather-desc { display: block; font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .weather-list { flex: 1; padding-left: 0; list-style: none; margin: 0; font-size: 14px; }
  .weather-list li { margin: 6px 0; }

  /* Todo list */
  .todo-list { padding-left: 24px; font-size: 14.5px; }
  .todo-list li { margin: 6px 0; }
  .todo-list li.p1 { color: var(--high); font-weight: 600; }
  .todo-list li.p2 { color: var(--medium); }
  .todo-list li.p3 { color: var(--text-muted); }

  .footer { margin-top: 30px; text-align: center; color: var(--text-muted); font-size: 12px; padding: 14px; }

  @media (max-width: 720px) {
    .container { padding: 18px 14px 60px; }
    .header { padding: 20px 18px; }
    .header h1 { font-size: 22px; }
    .section { padding: 18px 18px; }
    .grid-two, .news-grid { grid-template-columns: 1fr; }
    .weather-card { flex-direction: column; gap: 12px; }
    .weather-main { width: 100%; }
  }
</style>
</head>

    <div class="logo">🔒</div>
    <h1>Briefing Diario</h1>
    <p class="sub">Contenido cifrado · introduce la contraseña para continuar</p>
    <form id="lock-form" autocomplete="off">
      <input id="lock-password" type="password" placeholder="Contraseña" autofocus>
      <button type="submit">Desbloquear</button>
      <div id="lock-error" class="err" role="alert"></div>
    </form>
  </div>
</div>

<div id="content" class="container" style="display:none;"></div>

  const form = document.getElementById('lock-form');
  const passInput = document.getElementById('lock-password');
  const errBox = document.getElementById('lock-error');
  const lockScreen = document.getElementById('lock-screen');
  const content = document.getElementById('content');

  function attemptUnlock(pw) {
    try {
      const decrypted = CryptoJS.AES.decrypt(ENCRYPTED, pw).toString(CryptoJS.enc.Utf8);
      if (!decrypted || decrypted.length < 10) throw new Error('empty');
      content.innerHTML = decrypted;
      lockScreen.style.display = 'none';
      content.style.display = 'block';
      document.title = "Briefing Diario · 2 mayo 2026";
      return true;
    } catch (e) {
      return false;
    }
  }

  form.addEventListener('submit', function (ev) {
    ev.preventDefault();
    errBox.textContent = '';
    const pw = passInput.value || '';
    if (!attemptUnlock(pw)) {
      errBox.textContent = 'Contraseña incorrecta. Inténtalo de nuevo.';
      passInput.value = '';
      passInput.focus();
    }
  });
</script>
