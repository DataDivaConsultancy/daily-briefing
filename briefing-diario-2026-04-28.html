<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
<meta name="robots" content="noindex, nofollow">
<title>Briefing Diario · Privado</title>
<link rel="preconnect" href="https://cdnjs.cloudflare.com">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  :root {
    --bg: #f7f7f5;
    --bg-grad-1: #f3efe8;
    --bg-grad-2: #eef1f5;
    --surface: #ffffff;
    --surface-2: #fafaf8;
    --ink: #1a1a1a;
    --ink-2: #4a4a4a;
    --muted: #888;
    --line: #e6e3dd;
    --accent: #2b3a55;
    --accent-2: #c8a96a;
    --red: #b73a3a;
    --orange: #c46a1c;
    --blue: #2c5d8a;
    --green: #2a7a4f;
    --gray: #6b6b6b;
    --shadow: 0 1px 3px rgba(20,20,30,0.06), 0 8px 24px rgba(20,20,30,0.05);
  }
  html, body { margin: 0; padding: 0; }
  body {
    background: linear-gradient(180deg, var(--bg-grad-1) 0%, var(--bg-grad-2) 100%);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", "Inter", system-ui, sans-serif;
    font-size: 16px;
    line-height: 1.55;
    min-height: 100vh;
  }
  .gate {
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 24px;
  }
  .gate-card {
    width: 100%;
    max-width: 420px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 16px;
    box-shadow: var(--shadow);
    padding: 36px 32px;
    text-align: center;
  }
  .gate-logo {
    width: 56px; height: 56px;
    border-radius: 14px;
    margin: 0 auto 16px;
    display: grid; place-items: center;
    background: linear-gradient(135deg, var(--accent), #4a5d80);
    color: #fff;
    font-weight: 600;
    font-size: 22px;
    letter-spacing: 0.5px;
  }
  .gate h1 {
    margin: 4px 0 4px;
    font-size: 22px;
    letter-spacing: -0.01em;
  }
  .gate p { color: var(--muted); margin: 0 0 24px; font-size: 14px; }
  .gate input[type="password"] {
    width: 100%;
    padding: 12px 14px;
    font-size: 15px;
    border: 1px solid var(--line);
    border-radius: 10px;
    background: var(--surface-2);
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s;
  }
  .gate input[type="password"]:focus { border-color: var(--accent); }
  .gate button {
    margin-top: 12px;
    width: 100%;
    padding: 12px 14px;
    font-size: 15px;
    font-weight: 500;
    border: none;
    border-radius: 10px;
    background: var(--accent);
    color: #fff;
    cursor: pointer;
    transition: background 0.15s;
  }
  .gate button:hover { background: #1f2c44; }
  .gate-error {
    color: var(--red);
    font-size: 13px;
    margin-top: 12px;
    min-height: 16px;
  }
  .container {
    max-width: 1080px;
    margin: 0 auto;
    padding: 32px 20px 80px;
  }
  .hero {
    text-align: left;
    padding: 28px 28px 24px;
    background: linear-gradient(135deg, var(--accent), #3a4d70);
    color: #fff;
    border-radius: 16px;
    box-shadow: var(--shadow);
    margin-bottom: 20px;
  }
  .hero-meta {
    font-size: 13px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.7);
    margin-bottom: 6px;
  }
  .hero h1 {
    margin: 0 0 6px;
    font-size: 32px;
    letter-spacing: -0.02em;
    font-weight: 600;
  }
  .hero-sub { color: rgba(255,255,255,0.85); font-size: 15px; }
  .card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 22px 24px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
  }
  .card h2 {
    margin: 0 0 14px;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.01em;
    color: var(--ink);
    border-bottom: 1px solid var(--line);
    padding-bottom: 10px;
  }
  .card .subtitle {
    margin: 18px 0 8px;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    font-weight: 600;
  }
  .summary, .priorities, .tasks {
    margin: 0;
    padding-left: 20px;
  }
  .summary li, .tasks li, .priorities li { margin: 6px 0; }
  .tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-right: 6px;
    color: #fff;
    vertical-align: 1px;
  }
  .tag-red { background: var(--red); }
  .tag-orange { background: var(--orange); }
  .tag-blue { background: var(--blue); }
  .tag-gray { background: var(--gray); }
  .email {
    border-left: 3px solid var(--line);
    padding: 10px 14px;
    margin: 10px 0;
    background: var(--surface-2);
    border-radius: 0 8px 8px 0;
  }
  .email.muted { opacity: 0.75; }
  .email-head { display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; }
  .email-from { font-weight: 600; color: var(--ink); font-size: 14px; }
  .email-subject { font-size: 15px; color: var(--ink); margin: 4px 0 6px; }
  .email-summary { color: var(--ink-2); font-size: 14px; margin-bottom: 6px; }
  .email-action { font-size: 13px; color: var(--ink-2); margin-bottom: 4px; }
  .email-reply { font-size: 13px; color: var(--ink-2); font-style: italic; background: #fff; padding: 8px 10px; border-radius: 6px; border: 1px solid var(--line); }
  .prio { font-size: 11px; padding: 2px 8px; border-radius: 6px; font-weight: 600; letter-spacing: 0.04em; }
  .prio-high { background: #fdebe9; color: var(--red); }
  .prio-med { background: #fdf3e0; color: var(--orange); }
  .prio-low { background: #eef0f3; color: var(--gray); }
  .timeline { display: flex; flex-direction: column; gap: 6px; }
  .slot {
    display: grid;
    grid-template-columns: 110px 1fr auto;
    align-items: baseline;
    gap: 14px;
    padding: 10px 12px;
    border-radius: 8px;
    background: var(--surface-2);
    border-left: 3px solid var(--line);
    font-size: 14px;
  }
  .slot.busy { border-left-color: var(--accent); background: #f3f6fb; }
  .slot.free { border-left-color: var(--green); }
  .slot .time { font-weight: 600; color: var(--ink); font-feature-settings: "tnum"; }
  .slot .title { color: var(--ink); }
  .slot .src { color: var(--muted); font-size: 12px; }
  .news-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 18px;
  }
  .news-block h3 {
    margin: 0 0 8px;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--accent);
  }
  .news-block ul { margin: 0; padding-left: 18px; }
  .news-block li { font-size: 14px; margin: 5px 0; color: var(--ink-2); }
  .news-block em { color: var(--muted); font-style: normal; font-size: 12px; }
  .weather-card .weather { display: flex; align-items: center; gap: 24px; flex-wrap: wrap; }
  .weather-temp {
    font-size: 44px;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--accent);
    font-feature-settings: "tnum";
  }
  .weather-info { font-size: 14px; color: var(--ink-2); }
  .weather-info > div { margin: 3px 0; }
  .weather-rec { margin-top: 6px !important; color: var(--ink); }
  .weather-source { color: var(--muted); font-size: 12px; margin-top: 6px !important; }
  .note { font-size: 13px; color: var(--ink-2); }
  .note.muted { color: var(--muted); }
  .sources { margin: 0; padding-left: 18px; font-size: 13px; }
  .sources li { margin: 4px 0; }
  .sources a { color: var(--accent); text-decoration: none; }
  .sources a:hover { text-decoration: underline; }
  .footer {
    margin-top: 28px;
    text-align: center;
    color: var(--muted);
    font-size: 12px;
  }
  .footer-sub { margin-top: 4px; opacity: 0.7; }
  @media (max-width: 720px) {
    .container { padding: 18px 14px 60px; }
    .hero { padding: 22px 20px; }
    .hero h1 { font-size: 26px; }
    .card { padding: 18px 16px; }
    .news-grid { grid-template-columns: 1fr; }
    .slot { grid-template-columns: 95px 1fr; }
    .slot .src { grid-column: 1 / -1; }
  }
  .hidden { display: none !important; }
</style>
</head>
<body>

<div id="gate" class="gate">
  <div class="gate-card">
    <div class="gate-logo">HB</div>
    <h1>Briefing Diario</h1>
    <p>Acceso privado · Introduce la contraseña</p>
    <form id="gate-form" onsubmit="return tryDecrypt(event)">
      <input id="pw" type="password" autocomplete="current-password" autofocus placeholder="Contraseña">
      <button type="submit">Acceder</button>
      <div id="gate-error" class="gate-error"></div>
    </form>
  </div>
</div>

<div id="content" class="container hidden"></div>

function tryDecrypt(ev) {
  ev.preventDefault();
  const pw = document.getElementById("pw").value;
  const errorEl = document.getElementById("gate-error");
  errorEl.textContent = "";
  if (!pw) { errorEl.textContent = "Introduce la contraseña."; return false; }
  try {
    const decrypted = CryptoJS.AES.decrypt(PAYLOAD, pw).toString(CryptoJS.enc.Utf8);
    if (!decrypted || decrypted.length < 10) {
      errorEl.textContent = "Contraseña incorrecta.";
      return false;
    }
    document.getElementById("content").innerHTML = decrypted;
    document.getElementById("content").classList.remove("hidden");
    document.getElementById("gate").classList.add("hidden");
    document.title = "Briefing Diario · 2026-04-28";
  } catch (e) {
    errorEl.textContent = "Contraseña incorrecta.";
  }
  return false;
}

// Allow ?p=password for quick access (optional convenience; password is still required server-side via decryption)
(function() {
  const url = new URL(window.location.href);
  const p = url.searchParams.get("p");
  if (p) {
    document.getElementById("pw").value = p;
    setTimeout(() => document.getElementById("gate-form").requestSubmit(), 30);
  }
})();
</script>
