<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Briefing Diario · 2026-04-26</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
<style>
  :root {
    --bg: #0e1116;
    --card: #161b22;
    --border: #2a3038;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent: #58a6ff;
    --high: #f85149;
    --med: #d29922;
    --low: #3fb950;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }
  .container { max-width: 960px; margin: 0 auto; padding: 24px 20px 80px; }
  /* Login */
  #login {
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 20px;
  }
  #login h1 { font-size: 36px; margin: 0 0 8px; letter-spacing: -0.02em; }
  #login p.tag { color: var(--muted); margin: 0 0 32px; }
  #login form { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 320px; }
  #login input[type=password] {
    background: var(--card); border: 1px solid var(--border); color: var(--text);
    padding: 12px 14px; border-radius: 8px; font-size: 16px; outline: none;
    transition: border-color .15s;
  }
  #login input[type=password]:focus { border-color: var(--accent); }
  #login button {
    background: var(--accent); color: #0d1117; border: none; padding: 12px 14px;
    border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer;
  }
  #login button:hover { filter: brightness(1.1); }
  #login .err { color: var(--high); font-size: 14px; min-height: 20px; }
  /* Dashboard */
  .hero { padding: 8px 0 24px; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
  .hero h1 { margin: 0 0 4px; font-size: 32px; letter-spacing: -0.02em; }
  .hero .date { color: var(--muted); margin: 0; font-size: 14px; }
  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 20px 22px; margin-bottom: 18px;
  }
  .card h2 {
    margin: 0 0 14px; font-size: 18px; letter-spacing: -0.01em;
    padding-bottom: 10px; border-bottom: 1px solid var(--border);
  }
  .card h3 { font-size: 14px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin: 18px 0 8px; }
  .card h3.urgency-high { color: var(--high); }
  .card h3.urgency-medium { color: var(--med); }
  .card h3.urgency-low { color: var(--low); }
  .card ul, .card ol { padding-left: 22px; margin: 8px 0; }
  .card li { margin: 4px 0; }
  /* Email cards */
  .email {
    background: rgba(255,255,255,0.02); border-left: 3px solid var(--border);
    padding: 12px 16px; margin: 10px 0; border-radius: 0 8px 8px 0;
  }
  .email.priority-high { border-left-color: var(--high); }
  .email.priority-medium { border-left-color: var(--med); }
  .email.priority-low { border-left-color: var(--low); }
  .email-meta { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
  .email-from { font-size: 13px; color: var(--muted); }
  .email-subject { font-weight: 600; margin: 4px 0 8px; }
  .email p { margin: 6px 0; font-size: 14px; }
  .email details { margin: 8px 0; font-size: 14px; }
  .email summary { cursor: pointer; color: var(--accent); }
  .email .quick-reply { font-size: 13px; color: var(--muted); border-top: 1px dashed var(--border); padding-top: 8px; margin-top: 10px; }
  /* Timeline */
  .timeline { list-style: none; padding: 0; }
  .timeline li {
    display: grid; grid-template-columns: 130px 1fr auto; gap: 12px;
    padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 14px;
  }
  .timeline li:last-child { border-bottom: none; }
  .timeline .time { color: var(--accent); font-variant-numeric: tabular-nums; }
  .timeline .src { color: var(--muted); font-size: 12px; }
  /* Weather */
  .weather-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin: 14px 0; }
  .weather-grid > div { text-align: center; background: rgba(255,255,255,0.03); border-radius: 8px; padding: 12px 4px; }
  .weather-grid .big { font-size: 24px; font-weight: 600; }
  .weather-grid .lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 4px; }
  /* Tags */
  .tag {
    display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 10px;
    font-weight: 700; letter-spacing: 0.05em; margin-right: 8px;
  }
  .tag-high { background: rgba(248,81,73,0.18); color: var(--high); }
  .tag-med { background: rgba(210,153,34,0.18); color: var(--med); }
  .tag-low { background: rgba(63,185,80,0.18); color: var(--low); }
  .src { color: var(--muted); font-size: 12px; margin-top: 4px; }
  /* Mobile */
  @media (max-width: 600px) {
    .container { padding: 16px 14px 60px; }
    .hero h1 { font-size: 26px; }
    .card { padding: 16px; }
    .weather-grid { grid-template-columns: repeat(2, 1fr); }
    .timeline li { grid-template-columns: 1fr; gap: 4px; }
    .timeline .src { font-size: 11px; }
  }
</style>
</head>

    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const pwd = document.getElementById('pwd').value;
      const err = document.getElementById('err');
      try {
        const bytes = CryptoJS.AES.decrypt(CIPHER, pwd);
        const plaintext = bytes.toString(CryptoJS.enc.Utf8);
        if (!plaintext || plaintext.indexOf('<div class="briefing-content">') === -1) {
          throw new Error('bad password');
        }
        document.getElementById('login').style.display = 'none';
        const c = document.getElementById('content');
        c.innerHTML = plaintext;
        c.style.display = 'block';
      } catch(ex) {
        err.textContent = 'Contraseña incorrecta. Intente de nuevo.';
        document.getElementById('pwd').value = '';
        document.getElementById('pwd').focus();
      }
    });
