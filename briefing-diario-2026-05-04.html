<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Briefing Diario · Horacio Broggi</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
<style>
  :root {
    --bg: #0f1419;
    --panel: #1a2028;
    --card: #232b35;
    --text: #e6e8eb;
    --muted: #8b95a3;
    --accent: #d4a017;
    --accent-soft: #d4a01722;
    --red: #e25555;
    --orange: #e08a2a;
    --yellow: #d6c33a;
    --gray: #6c7783;
    --green: #4ea06b;
    --border: #2c3540;
  }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif; line-height: 1.55; -webkit-font-smoothing: antialiased; }
  body { padding: 24px 16px 80px; max-width: 980px; margin: 0 auto; }
  h1 { font-size: 28px; margin: 0 0 4px; letter-spacing: -0.3px; }
  h2 { font-size: 18px; margin: 0 0 14px; padding-bottom: 8px; border-bottom: 1px solid var(--border); color: var(--accent); letter-spacing: 0.2px; text-transform: uppercase; font-weight: 600; }
  h3 { font-size: 15px; margin: 18px 0 8px; color: var(--text); }
  p, li { font-size: 14.5px; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  .meta, .meta-row { color: var(--muted); font-size: 12.5px; }
  .brief-header { margin-bottom: 24px; padding: 20px 22px; background: linear-gradient(135deg, #1a2028, #1f2731); border-radius: 14px; border: 1px solid var(--border); }
  .card { background: var(--card); border-radius: 14px; padding: 22px 24px; margin-bottom: 18px; border: 1px solid var(--border); box-shadow: 0 2px 6px rgba(0,0,0,0.15); }
  .card.highlight { border-left: 4px solid var(--accent); }
  .card.weather { background: linear-gradient(135deg, #232b35, #2a3543); }
  .card.sources li { font-size: 13px; }
  .email { background: rgba(0,0,0,0.18); border-radius: 10px; padding: 14px 16px; margin-bottom: 12px; border: 1px solid var(--border); }
  .email-head { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; flex-wrap: wrap; }
  .badge { display: inline-block; padding: 2px 9px; border-radius: 12px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; }
  .badge.red { background: var(--red); color: white; }
  .badge.orange { background: var(--orange); color: white; }
  .badge.yellow { background: var(--yellow); color: #1a1a1a; }
  .badge.gray { background: var(--gray); color: white; }
  h3.urgent { color: var(--red); }
  h3.important { color: var(--orange); }
  h3.pending { color: var(--muted); }
  .timeline { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
  .event { display: grid; grid-template-columns: 130px 1fr 130px; gap: 12px; padding: 8px 12px; background: rgba(212,160,23,0.08); border-radius: 8px; border-left: 3px solid var(--accent); align-items: center; }
  .event .hour { font-weight: 600; color: var(--accent); font-size: 13px; }
  .event .title { font-size: 14px; }
  .event .origin { color: var(--muted); font-size: 12px; text-align: right; }
  .weather-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin: 12px 0; }
  .weather-grid > div { background: rgba(0,0,0,0.2); padding: 14px; border-radius: 10px; text-align: center; display: flex; flex-direction: column; gap: 4px; }
  .weather-grid .big { font-size: 18px; font-weight: 600; color: var(--accent); }
  .weather-grid .lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .warn { background: rgba(226,85,85,0.12); border-left: 3px solid var(--red); padding: 10px 14px; border-radius: 6px; }
  ul, ol { padding-left: 22px; margin: 0; }
  ul li, ol li { margin-bottom: 4px; }

  /* Login screen */
  .login-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 1000; }
  .login-box { background: var(--card); padding: 36px 32px; border-radius: 16px; border: 1px solid var(--border); max-width: 380px; width: 90%; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
  .login-box h1 { font-size: 22px; margin-bottom: 6px; color: var(--accent); }
  .login-box .sub { color: var(--muted); font-size: 13px; margin-bottom: 22px; }
  .login-box input { width: 100%; padding: 12px 14px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 15px; margin-bottom: 12px; }
  .login-box input:focus { outline: none; border-color: var(--accent); }
  .login-box button { width: 100%; padding: 12px; background: var(--accent); color: #1a1a1a; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
  .login-box button:hover { opacity: 0.9; }
  .login-box .error { color: var(--red); font-size: 13px; margin-top: 10px; min-height: 18px; }
  #content { display: none; }

  @media (max-width: 640px) {
    body { padding: 14px 10px 60px; }
    .card { padding: 16px 14px; }
    .event { grid-template-columns: 1fr; gap: 4px; }
    .event .origin { text-align: left; }
    .weather-grid { grid-template-columns: repeat(2, 1fr); }
    h1 { font-size: 22px; }
  }
</style>
</head>
<body>

<div id="login" class="login-overlay">
  <div class="login-box">
    <h1>Briefing Diario</h1>
    <div class="sub">Acceso protegido</div>
    <form id="login-form" autocomplete="off">
      <input type="password" id="pw" placeholder="Contraseña" autofocus>
      <button type="submit">Acceder</button>
      <div class="error" id="error"></div>
    </form>
  </div>
</div>

<div id="content"></div>

  function decryptAndShow(password) {
    try {
      var bytes = CryptoJS.AES.decrypt(CIPHERTEXT, password);
      var html = bytes.toString(CryptoJS.enc.Utf8);
      if (!html || html.length < 50) throw new Error("bad");
      document.getElementById('content').innerHTML = html;
      document.getElementById('content').style.display = 'block';
      document.getElementById('login').style.display = 'none';
      return true;
    } catch (e) {
      return false;
    }
  }

  document.getElementById('login-form').addEventListener('submit', function(e) {
    e.preventDefault();
    var pw = document.getElementById('pw').value;
    var ok = decryptAndShow(pw);
    if (!ok) {
      document.getElementById('error').textContent = 'Contraseña incorrecta';
      document.getElementById('pw').value = '';
      document.getElementById('pw').focus();
    }
  });
</script>

</body>
