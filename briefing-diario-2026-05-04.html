<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Briefing Diario · 2026-05-04</title>
<style>
:root{
  --bg:#0b0d12;
  --panel:#12161f;
  --panel2:#171c27;
  --border:#1f2735;
  --txt:#e8ecf3;
  --muted:#8a94a8;
  --accent:#c9a96a;
  --accent2:#7aa2f7;
  --urgent:#ff5d6c;
  --medium:#f0b429;
  --low:#5dd6a1;
  --focus:#7aa2f7;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;line-height:1.55}
.shell{max-width:1200px;margin:0 auto;padding:28px 22px 60px}
.hdr{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:18px;margin-bottom:24px;padding-bottom:18px;border-bottom:1px solid var(--border)}
.brand{display:flex;gap:14px;align-items:center}
.logo{width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,var(--accent),#a9874f);display:flex;align-items:center;justify-content:center;font-weight:700;color:#1a120a;letter-spacing:0.5px}
.hdr h1{margin:0;font-size:24px;letter-spacing:-0.3px}
.meta{color:var(--muted);font-size:13px;margin-top:2px}
.weather-pill{background:var(--panel);border:1px solid var(--border);padding:10px 14px;border-radius:999px;display:flex;gap:10px;align-items:center;font-size:14px}
.wx-icon{font-size:18px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:18px}
.card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:20px}
.card.span-2{grid-column:1/-1}
.card h2{margin:0 0 14px;font-size:16px;letter-spacing:0.3px;color:var(--accent);text-transform:uppercase;font-weight:600}
.card h3{font-size:13px;margin:14px 0 6px;color:var(--muted);text-transform:uppercase;letter-spacing:0.4px;font-weight:600}
.list{margin:0;padding-left:20px}
.list li{margin-bottom:6px}
.email{background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:10px}
.email .row{display:flex;gap:8px;align-items:center;font-size:12px;margin-bottom:4px}
.email .from{color:var(--muted);font-size:13px}
.email .subj{font-weight:600;margin:4px 0 6px}
.email p{margin:4px 0;font-size:14px}
.muted{color:var(--muted);font-size:13px}
.tag{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600;letter-spacing:0.4px}
.tag.urgent{background:rgba(255,93,108,0.15);color:var(--urgent);border:1px solid rgba(255,93,108,0.3)}
.tag.medium{background:rgba(240,180,41,0.15);color:var(--medium);border:1px solid rgba(240,180,41,0.3)}
.tag.low{background:rgba(93,214,161,0.12);color:var(--low);border:1px solid rgba(93,214,161,0.3)}
.tag.focus{background:rgba(122,162,247,0.12);color:var(--focus);border:1px solid rgba(122,162,247,0.3)}
.agenda{width:100%;border-collapse:collapse;font-size:14px}
.agenda th,.agenda td{padding:8px 10px;border-bottom:1px solid var(--border);text-align:left}
.agenda th{color:var(--muted);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:0.4px}
.weather{text-align:left}
.weather .big{font-size:36px;font-weight:700;letter-spacing:-1px;color:var(--accent2)}
.ftr{margin-top:32px;padding-top:18px;border-top:1px solid var(--border);color:var(--muted);font-size:12px}
.ftr .muted{font-size:11px;margin-top:4px}
code{background:#0a0d12;padding:2px 6px;border-radius:4px;font-size:12px;color:var(--accent2)}

/* Lock screen */
.lock-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at top,#1a2030 0%,#0b0d12 60%)}
.lock-card{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:40px;max-width:380px;width:90%;text-align:center;box-shadow:0 20px 50px rgba(0,0,0,0.4)}
.lock-card .logo{margin:0 auto 18px;width:64px;height:64px;border-radius:16px;font-size:20px}
.lock-card h2{margin:0 0 8px;font-size:22px}
.lock-card p{color:var(--muted);margin:0 0 24px;font-size:14px}
.lock-card input{width:100%;padding:12px 14px;font-size:15px;background:var(--panel2);border:1px solid var(--border);border-radius:10px;color:var(--txt);margin-bottom:12px;outline:none}
.lock-card input:focus{border-color:var(--accent)}
.lock-card button{width:100%;padding:12px;background:linear-gradient(135deg,var(--accent),#a9874f);color:#1a120a;border:none;border-radius:10px;font-weight:700;cursor:pointer;font-size:15px}
.lock-card button:hover{filter:brightness(1.08)}
.lock-card .err{color:var(--urgent);font-size:13px;margin-top:10px;min-height:16px}

@media (max-width: 720px){
  .grid{grid-template-columns:1fr}
  .card.span-2{grid-column:1}
  .hdr h1{font-size:20px}
}
</style>
</head>
<body>

<div id="lock" class="lock-screen">
  <div class="lock-card">
    <div class="logo">HB</div>
    <h2>Briefing Diario</h2>
    <p>Introduce la contraseña para acceder al briefing privado</p>
    <input id="pw" type="password" placeholder="Contraseña" autocomplete="off" autofocus>
    <button id="unlock">Desbloquear</button>
    <div id="err" class="err"></div>
  </div>
</div>

<div id="content" class="shell" style="display:none"></div>

function tryUnlock(){
  const pw = document.getElementById('pw').value;
  const errEl = document.getElementById('err');
  errEl.textContent = '';
  try {
    const decrypted = CryptoJS.AES.decrypt(ENCRYPTED, pw).toString(CryptoJS.enc.Utf8);
    if (!decrypted || decrypted.length < 50) throw new Error('Bad password');
    document.getElementById('lock').style.display = 'none';
    const c = document.getElementById('content');
    c.style.display = 'block';
    c.innerHTML = decrypted;
  } catch(e) {
    errEl.textContent = 'Contraseña incorrecta';
    document.getElementById('pw').value = '';
    document.getElementById('pw').focus();
  }
}

document.getElementById('unlock').addEventListener('click', tryUnlock);
document.getElementById('pw').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') tryUnlock();
});
</script>
