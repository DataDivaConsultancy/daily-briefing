<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Briefing Diario · 8 mayo 2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
<style>
  :root {
    --bg: #0e1116;
    --bg-soft: #161b22;
    --card: #1c232c;
    --card-2: #232c37;
    --border: #2a323d;
    --text: #e7ecf2;
    --muted: #94a3b8;
    --accent: #f59e0b;
    --accent-soft: #fbbf24;
    --high: #ef4444;
    --mid: #f59e0b;
    --low: #10b981;
    --link: #93c5fd;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: linear-gradient(180deg, #0b0f15 0%, #0e1116 100%);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", "Helvetica Neue", Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    line-height: 1.55;
    min-height: 100vh;
  }
  .wrap { max-width: 1100px; margin: 0 auto; padding: 32px 24px 80px; }

  #login { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .login-box { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 40px 36px; width: 100%; max-width: 420px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); text-align: center; }
  .login-box .logo { font-size: 14px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; font-weight: 600; }
  .login-box h1 { margin: 0 0 8px; font-size: 28px; font-weight: 700; }
  .login-box p.sub { color: var(--muted); margin: 0 0 24px; font-size: 14px; }
  .login-box input[type="password"] { width: 100%; padding: 12px 14px; background: var(--bg-soft); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 16px; margin-bottom: 12px; outline: none; }
  .login-box input[type="password"]:focus { border-color: var(--accent); }
  .login-box button { width: 100%; padding: 12px 14px; background: var(--accent); color: #0e1116; border: 0; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; transition: background 0.2s; }
  .login-box button:hover { background: var(--accent-soft); }
  .login-box .err { color: var(--high); font-size: 13px; min-height: 18px; margin-top: 12px; }

  #app { display: none; }
  .briefing-content > section { margin-bottom: 18px; }

  .hero { background: linear-gradient(135deg, #1c232c 0%, #232c37 100%); border: 1px solid var(--border); border-radius: 18px; padding: 36px 32px; margin-bottom: 22px; }
  .hero .badge { display: inline-block; background: rgba(245,158,11,0.15); color: var(--accent-soft); padding: 4px 12px; border-radius: 999px; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; font-weight: 700; margin-bottom: 10px; }
  .hero h1 { margin: 0 0 4px; font-size: 32px; font-weight: 700; letter-spacing: -0.02em; }
  .hero-date { color: var(--muted); margin: 0; font-size: 15px; }

  .grid { display: grid; gap: 18px; }
  .grid-2 { grid-template-columns: 1fr 1fr; }
  @media (max-width: 720px) {
    .grid-2 { grid-template-columns: 1fr; }
    .hero { padding: 24px 20px; }
    .hero h1 { font-size: 26px; }
    .wrap { padding: 20px 16px 60px; }
  }

  .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 22px 24px; }
  .card h2 { margin: 0 0 12px; font-size: 18px; font-weight: 700; letter-spacing: -0.01em; }
  .card h3 { margin: 18px 0 8px; font-size: 14px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
  .card h3.urgent { color: var(--high); }
  .card h4 { margin: 4px 0 8px; font-size: 13px; font-weight: 700; color: var(--accent-soft); text-transform: uppercase; letter-spacing: 0.08em; }
  .card.warn { background: rgba(239,68,68,0.06); border-color: rgba(239,68,68,0.25); }

  .muted { color: var(--muted); font-size: 13px; }
  .source { color: var(--muted); font-size: 12px; margin-top: 8px; font-style: italic; }

  .weather-card .weather-temp { font-size: 44px; font-weight: 700; letter-spacing: -0.03em; margin: 4px 0 4px; }

  .priorities { padding-left: 22px; margin: 8px 0 0; }
  .priorities li { margin-bottom: 8px; }

  ul, ol { margin: 6px 0; padding-left: 22px; }
  ul li, ol li { margin-bottom: 4px; }

  table.agenda { width: 100%; border-collapse: collapse; font-size: 14px; margin-top: 6px; }
  table.agenda th, table.agenda td { text-align: left; padding: 10px 8px; border-bottom: 1px solid var(--border); }
  table.agenda th { font-weight: 600; color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; }
  table.agenda tr.free td { color: var(--muted); }

  .email-row { border-top: 1px solid var(--border); padding: 14px 0; }
  .email-row:first-of-type { border-top: 0; }
  .email-head { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; margin-bottom: 4px; }
  .email-head strong { font-size: 15px; }
  .pill { padding: 2px 10px; border-radius: 999px; font-size: 11px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; }
  .pill-high { background: rgba(239,68,68,0.18); color: #fca5a5; }
  .pill-mid { background: rgba(245,158,11,0.18); color: #fcd34d; }
  .pill-low { background: rgba(16,185,129,0.18); color: #6ee7b7; }
  .action { color: var(--accent-soft); font-size: 14px; margin-top: 4px; }

  ul.quiet { color: var(--muted); }

  .news-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  @media (max-width: 720px) { .news-grid { grid-template-columns: 1fr; } }

  .foot { margin-top: 30px; text-align: center; color: var(--muted); font-size: 12px; }
  .foot p { margin: 4px 0; }
</style>
</head>
<body>

<div id="login">
  <form class="login-box" id="loginForm" autocomplete="off">
    <div class="logo">Daily · Broggo</div>
    <h1>Briefing Diario</h1>
    <p class="sub">Contenido cifrado AES-256 · introduce la contraseña</p>
    <input type="password" id="pwd" placeholder="Contraseña" autofocus />
    <button type="submit">Desbloquear</button>
    <div class="err" id="err"></div>
  </form>
</div>

<div id="app">
  <div class="wrap" id="content"></div>
</div>

  var login = document.getElementById('login');
  var app = document.getElementById('app');
  var content = document.getElementById('content');

  form.addEventListener('submit', function(e){
    e.preventDefault();
    err.textContent = '';
    var pwd = pwdInput.value;
    if (!pwd) { err.textContent = 'Introduce la contraseña.'; return; }
    try {
      var dec = CryptoJS.AES.decrypt(ENCRYPTED, pwd);
      var html = dec.toString(CryptoJS.enc.Utf8);
      if (!html || html.indexOf('<div class="briefing-content">') === -1) {
        throw new Error('bad-password');
      }
      content.innerHTML = html;
      login.style.display = 'none';
      app.style.display = 'block';
      document.title = 'Briefing Diario · 8 mayo 2026';
    } catch (ex) {
      err.textContent = 'Contraseña incorrecta. Inténtalo de nuevo.';
      pwdInput.value = '';
      pwdInput.focus();
    }
  });
})();
</script>
</body>
</html>
