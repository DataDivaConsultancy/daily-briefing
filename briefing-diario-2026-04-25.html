<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Briefing Diario · 2026-04-25</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f1116;
  --bg-card: #1a1d24;
  --bg-card-2: #21252e;
  --border: #2a2f3a;
  --text: #e8eaed;
  --text-dim: #9aa0a6;
  --text-muted: #6c7280;
  --accent: #4f8cff;
  --accent-2: #7eb6ff;
  --red: #f47174;
  --orange: #f9a85b;
  --green: #6dcf8a;
  --gray: #6c7280;
  --shadow: 0 6px 24px rgba(0,0,0,0.35);
}
@media (prefers-color-scheme: light) {
  :root {
    --bg: #f6f7f9;
    --bg-card: #ffffff;
    --bg-card-2: #f0f2f5;
    --border: #e3e6ea;
    --text: #1a1d24;
    --text-dim: #4b5563;
    --text-muted: #6c7280;
    --accent: #2563eb;
    --accent-2: #1e40af;
    --shadow: 0 4px 16px rgba(0,0,0,0.06);
  }
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.55;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
.container { max-width: 1100px; margin: 0 auto; padding: 32px 24px 80px; }
.lock-screen {
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; padding: 24px;
}
.lock-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 16px; padding: 48px 40px; max-width: 420px; width: 100%;
  box-shadow: var(--shadow); text-align: center;
}
.lock-card .icon {
  width: 56px; height: 56px; margin: 0 auto 20px;
  border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent-2));
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; color: #fff;
}
.lock-card h1 { font-size: 22px; font-weight: 600; margin-bottom: 8px; letter-spacing: -0.01em; }
.lock-card p { color: var(--text-dim); font-size: 14px; margin-bottom: 28px; }
.lock-form { display: flex; flex-direction: column; gap: 12px; }
.lock-form input {
  background: var(--bg-card-2); border: 1px solid var(--border);
  color: var(--text); padding: 12px 16px; border-radius: 8px;
  font-size: 15px; outline: none; transition: border-color 0.15s;
}
.lock-form input:focus { border-color: var(--accent); }
.lock-form button {
  background: var(--accent); color: #fff; border: 0;
  padding: 12px 16px; border-radius: 8px; font-size: 15px; font-weight: 500;
  cursor: pointer; transition: opacity 0.15s;
}
.lock-form button:hover { opacity: 0.9; }
.lock-error {
  color: var(--red); font-size: 13px; margin-top: 8px; min-height: 18px;
}

.hero {
  display: grid; grid-template-columns: 1fr auto; gap: 24px;
  background: linear-gradient(135deg, var(--bg-card), var(--bg-card-2));
  border: 1px solid var(--border);
  border-radius: 16px; padding: 32px; margin-bottom: 24px;
  box-shadow: var(--shadow);
}
.eyebrow {
  font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--accent); font-weight: 600; margin-bottom: 12px;
}
.hero h1 {
  font-size: 32px; font-weight: 700; letter-spacing: -0.02em;
  margin-bottom: 8px;
}
.hero .meta { color: var(--text-dim); font-size: 14px; }
.weather-card {
  background: var(--bg-card-2); border-radius: 12px; padding: 20px 24px;
  text-align: right;
}
.weather-temp { font-size: 28px; font-weight: 600; }
.weather-cond { color: var(--text-dim); font-size: 14px; margin-top: 4px; }
.weather-rec { color: var(--orange); font-size: 12px; margin-top: 8px; }

.card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 16px; padding: 28px 32px; margin-bottom: 20px;
  box-shadow: var(--shadow);
}
.card h2 {
  font-size: 18px; font-weight: 600; margin-bottom: 20px;
  letter-spacing: -0.01em; padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}
.card h3 {
  font-size: 15px; font-weight: 600; margin: 18px 0 10px;
  color: var(--text);
}

.summary { list-style: none; }
.summary li {
  padding: 10px 0 10px 22px; position: relative;
  border-bottom: 1px dashed var(--border); font-size: 14.5px;
}
.summary li:last-child { border-bottom: 0; }
.summary li::before {
  content: ""; position: absolute; left: 0; top: 18px;
  width: 6px; height: 6px; border-radius: 50%; background: var(--accent);
}

.prio-block { margin-bottom: 24px; }
.prio-header {
  font-size: 13px; font-weight: 600; letter-spacing: 0.04em;
  text-transform: uppercase; color: var(--text-dim);
  padding: 8px 12px; background: var(--bg-card-2); border-radius: 6px;
  margin-bottom: 12px;
}
.prio-block.urgent .prio-header { color: var(--red); }
.prio-block.important .prio-header { color: var(--orange); }

.email {
  border: 1px solid var(--border); border-radius: 12px;
  padding: 18px 20px; margin-bottom: 12px; background: var(--bg-card-2);
}
.email.small { padding: 12px 16px; }
.email header {
  display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
  margin-bottom: 8px;
}
.email h3 { margin: 4px 0 8px; font-size: 15px; font-weight: 600; }
.email.small h3 { font-size: 14px; margin: 2px 0 4px; }
.email-from { color: var(--text); font-size: 13px; font-weight: 500; }
.email-date { color: var(--text-muted); font-size: 12px; margin-left: auto; }
.summary-line { color: var(--text-dim); font-size: 13.5px; margin-bottom: 10px; }
.action {
  background: var(--bg-card); padding: 8px 12px; border-radius: 6px;
  font-size: 13px; border-left: 3px solid var(--accent);
  margin-bottom: 8px;
}
.email details {
  background: var(--bg-card); border-radius: 6px;
  padding: 8px 12px; margin-top: 6px; font-size: 13px;
}
.email details summary {
  cursor: pointer; color: var(--accent); font-weight: 500;
  user-select: none; outline: none;
}
.email details .reply {
  margin-top: 10px; padding: 10px; background: var(--bg-card-2);
  border-radius: 4px; color: var(--text-dim); white-space: pre-wrap;
  font-size: 13px; line-height: 1.6;
}

.badge {
  font-size: 10px; font-weight: 700; letter-spacing: 0.05em;
  padding: 3px 8px; border-radius: 4px; text-transform: uppercase;
}
.badge.red { background: rgba(244,113,116,0.15); color: var(--red); }
.badge.orange { background: rgba(249,168,91,0.15); color: var(--orange); }
.badge.green { background: rgba(109,207,138,0.15); color: var(--green); }
.badge.gray { background: rgba(108,114,128,0.18); color: var(--text-dim); }

.timeline { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }
.event {
  display: grid; grid-template-columns: 140px 1fr; gap: 16px;
  padding: 12px 16px; background: var(--bg-card-2);
  border-radius: 8px; border-left: 3px solid var(--accent);
}
.event.free { border-left-color: var(--gray); opacity: 0.85; }
.event-time { font-size: 13px; color: var(--text-dim); font-variant-numeric: tabular-nums; }
.event-body { font-size: 14px; }
.muted { color: var(--text-muted); font-size: 12px; }

.priorities ol {
  padding-left: 20px; margin-top: 10px;
  font-size: 14px; line-height: 1.8;
}
.priorities ol li::marker { color: var(--accent); font-weight: 700; }

.warning {
  background: rgba(249,168,91,0.1); border: 1px solid rgba(249,168,91,0.3);
  border-radius: 8px; padding: 12px 16px; font-size: 13px; color: var(--orange);
  margin-top: 16px;
}

.news-grid {
  display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px;
}
.news-col h3 {
  font-size: 13px; letter-spacing: 0.04em; text-transform: uppercase;
  color: var(--accent); padding-bottom: 6px; border-bottom: 1px solid var(--border);
  margin-bottom: 12px;
}
.news-item {
  padding: 10px 0; border-bottom: 1px dashed var(--border);
}
.news-item:last-child { border-bottom: 0; }
.news-item h4 { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
.news-item p { font-size: 13px; color: var(--text-dim); margin-bottom: 4px; }
.source {
  font-size: 11px; color: var(--text-muted); letter-spacing: 0.04em;
  text-transform: uppercase;
}

.weather-detail .weather-row {
  display: flex; justify-content: space-between; padding: 10px 0;
  border-bottom: 1px dashed var(--border); font-size: 14px;
}
.weather-detail .weather-row span { color: var(--text-dim); }
.weather-rec-line {
  margin-top: 16px; padding: 12px 16px; background: var(--bg-card-2);
  border-radius: 8px; font-size: 13.5px;
}

.todos { list-style: none; counter-reset: todo; }
.todos li {
  counter-increment: todo;
  display: flex; gap: 12px; align-items: center;
  padding: 10px 0; border-bottom: 1px dashed var(--border);
  font-size: 14px;
}
.todos li:last-child { border-bottom: 0; }
.todos li::before {
  content: counter(todo); width: 22px; height: 22px;
  background: var(--bg-card-2); border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; color: var(--text-dim); flex-shrink: 0;
}
.todos li .muted { margin-left: auto; }

.footer {
  text-align: center; padding-top: 32px;
  font-size: 12px; color: var(--text-muted);
}
.footer p:first-child { margin-bottom: 4px; }

@media (max-width: 720px) {
  .container { padding: 16px 12px 60px; }
  .hero { grid-template-columns: 1fr; padding: 24px; }
  .hero h1 { font-size: 24px; }
  .weather-card { text-align: left; }
  .card { padding: 20px; }
  .news-grid { grid-template-columns: 1fr; gap: 16px; }
  .event { grid-template-columns: 90px 1fr; gap: 10px; padding: 10px; }
  .email-date { margin-left: 0; }
}
</style>
</head>

      <button type="submit">Desbloquear</button>
      <div id="lock-err" class="lock-error"></div>

</div>
