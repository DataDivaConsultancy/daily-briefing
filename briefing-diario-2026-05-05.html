<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Briefing Diario</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
<style>
  :root {
    --bg: #0f1419;
    --panel: #1a1f2e;
    --panel-2: #232a3d;
    --text: #e8eaed;
    --muted: #9aa3b2;
    --accent: #d4af37;
    --accent-2: #c89c2a;
    --red: #d75f5f;
    --orange: #e8a96e;
    --green: #6dbe7e;
    --blue: #6e9be8;
    --border: #2d3548;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
  }
  .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
  header.brand { text-align: center; padding: 32px 0 16px; }
  header.brand h1 {
    font-size: 32px; font-weight: 300; letter-spacing: -0.5px;
    margin-bottom: 6px;
  }
  header.brand .accent { color: var(--accent); font-weight: 500; }
  header.brand .date { color: var(--muted); font-size: 14px; }
  /* LOGIN */
  #login {
    max-width: 440px; margin: 80px auto; padding: 40px 32px;
    background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
    text-align: center;
  }
  #login h2 { font-size: 22px; font-weight: 400; margin-bottom: 8px; }
  #login p { color: var(--muted); font-size: 14px; margin-bottom: 24px; }
  #login input {
    width: 100%; padding: 12px 14px; font-size: 15px;
    background: var(--panel-2); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px;
    outline: none; transition: border-color .15s;
  }
  #login input:focus { border-color: var(--accent); }
  #login button {
    width: 100%; padding: 12px; margin-top: 14px;
    background: var(--accent); color: #1a1f2e; font-weight: 600;
    border: none; border-radius: 8px; font-size: 15px; cursor: pointer;
    transition: background .15s;
  }
  #login button:hover { background: var(--accent-2); }
  #error {
    color: var(--red); font-size: 13px; margin-top: 12px; min-height: 18px;
  }
  /* DASHBOARD */
  #dashboard { display: none; }
  .meta { color: var(--muted); font-size: 13px; text-align: center; margin-bottom: 24px; }
  .grid { display: grid; gap: 18px; }
  .grid-2 { grid-template-columns: repeat(auto-fit, minmax(360px, 1fr)); }
  .card {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 12px; padding: 22px;
  }
  .card h2 {
    font-size: 16px; font-weight: 600; color: var(--accent);
    text-transform: uppercase; letter-spacing: 0.8px;
    border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 14px;
  }
  .card h3 {
    font-size: 14px; font-weight: 600; margin: 14px 0 8px;
    color: var(--text);
  }
  .card ul { list-style: none; }
  .card li { padding: 6px 0; font-size: 14px; color: var(--text); }
  .card li::before { content: "▸ "; color: var(--accent); margin-right: 4px; }
  .priority-high { border-left: 4px solid var(--red); padding-left: 12px; margin: 10px 0; }
  .priority-med { border-left: 4px solid var(--orange); padding-left: 12px; margin: 10px 0; }
  .priority-low { border-left: 4px solid var(--blue); padding-left: 12px; margin: 10px 0; }
  .email-item {
    background: var(--panel-2); padding: 14px; border-radius: 8px;
    margin-bottom: 10px; font-size: 13px;
  }
  .email-item .from { font-weight: 600; color: var(--text); }
  .email-item .subj { color: var(--accent); margin: 4px 0; font-size: 14px; }
  .email-item .date { color: var(--muted); font-size: 12px; }
  .email-item .summary { margin: 6px 0; color: #c8cdd6; }
  .email-item .action {
    color: var(--green); font-size: 12px; margin-top: 4px;
    font-weight: 500;
  }
  .email-item .draft {
    background: rgba(110,155,232,0.08); border-left: 3px solid var(--blue);
    padding: 8px 10px; margin-top: 8px; font-style: italic;
    font-size: 12px; color: #c8cdd6; border-radius: 4px;
  }
  .agenda-item {
    display: flex; align-items: flex-start; gap: 14px;
    padding: 10px 0; border-bottom: 1px solid var(--border);
  }
  .agenda-item:last-child { border-bottom: none; }
  .agenda-item .time {
    font-weight: 600; color: var(--accent); min-width: 100px;
    font-size: 13px;
  }
  .agenda-item .title { font-size: 14px; }
  .agenda-item .loc { color: var(--muted); font-size: 12px; }
  .news-item { padding: 10px 0; border-bottom: 1px solid var(--border); }
  .news-item:last-child { border-bottom: none; }
  .news-item .title { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
  .news-item .summary { color: #c8cdd6; font-size: 13px; }
  .news-item .source { color: var(--muted); font-size: 11px; margin-top: 4px; }
  .weather-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px; margin-bottom: 12px;
  }
  .weather-stat {
    background: var(--panel-2); padding: 14px; border-radius: 8px; text-align: center;
  }
  .weather-stat .label { font-size: 11px; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
  .weather-stat .value { font-size: 18px; font-weight: 600; color: var(--accent); }
  .alert {
    background: rgba(215,95,95,0.1); border-left: 4px solid var(--red);
    padding: 12px 14px; border-radius: 6px; margin: 10px 0;
    font-size: 13px;
  }
  .info {
    background: rgba(110,155,232,0.08); border-left: 4px solid var(--blue);
    padding: 12px 14px; border-radius: 6px; margin: 10px 0;
    font-size: 13px; color: var(--muted);
  }
  .top-priorities { counter-reset: prio; }
  .top-priorities li {
    counter-increment: prio; padding: 10px 0; padding-left: 36px;
    position: relative; border-bottom: 1px solid var(--border);
    font-size: 14px;
  }
  .top-priorities li:last-child { border-bottom: none; }
  .top-priorities li::before {
    content: counter(prio); color: #1a1f2e; background: var(--accent);
    position: absolute; left: 0; top: 12px;
    width: 24px; height: 24px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 12px; margin: 0;
  }
  .top-priorities li::marker { content: ""; }
  footer {
    text-align: center; color: var(--muted); font-size: 12px;
    padding: 24px 0; margin-top: 32px;
    border-top: 1px solid var(--border);
  }
  @media (max-width: 600px) {
    .container { padding: 16px; }
    header.brand h1 { font-size: 24px; }
    .card { padding: 16px; }
  }
</style>
</head>
<body>
<div class="container">

<header class="brand">
  <h1>Briefing <span class="accent">Diario</span></h1>
  <div class="date" id="brandDate">Martes, 5 de mayo de 2026</div>
</header>

<div id="login">
  <h2>Acceso protegido</h2>
  <p>Introduce la contraseña para ver el briefing del día.</p>
  <form id="loginForm">
    <input type="password" id="password" placeholder="Contraseña" autofocus autocomplete="current-password">
    <button type="submit">Entrar</button>
    <div id="error"></div>
  </form>
</div>

<div id="dashboard">
  <div class="meta" id="metaInfo"></div>
  <div id="content"></div>
  <footer>Briefing generado automáticamente · Horacio Broggi · Barcelona</footer>
</div>

</div>

<script>
function escapeHtml(s) {
  if (s === null || s === undefined) return "";
  return String(s).replace(/[&<>"']/g, function(c) {
    return ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]);
  });
}

function renderEmail(e, prioClass) {
  var draftHtml = e.draft ? '<div class="draft">📝 Borrador: ' + escapeHtml(e.draft) + '</div>' : '';
  return '<div class="email-item ' + prioClass + '">' +
    '<div class="from">' + escapeHtml(e.sender) + ' · <span class="date">' + escapeHtml(e.date) + '</span></div>' +
    '<div class="subj">' + escapeHtml(e.subject) + '</div>' +
    '<div class="summary">' + escapeHtml(e.summary) + '</div>' +
    '<div class="action">→ ' + escapeHtml(e.action) + '</div>' +
    draftHtml +
  '</div>';
}

function renderDashboard(data) {
  document.getElementById('brandDate').textContent = data.dateLong || data.date;
  document.getElementById('metaInfo').textContent = 'Generado: ' + data.generated_at;

  var html = '';

  // Resumen ejecutivo
  html += '<div class="card"><h2>Resumen ejecutivo del día</h2><ul>';
  data.executive_summary.forEach(function(s) { html += '<li>' + escapeHtml(s) + '</li>'; });
  html += '</ul></div>';

  // Top 3 prioridades
  html += '<div class="card"><h2>Top 3 prioridades de hoy</h2><ol class="top-priorities">';
  data.top_priorities.forEach(function(p) { html += '<li>' + escapeHtml(p) + '</li>'; });
  html += '</ol></div>';

  // Two-column: Agenda + Clima
  html += '<div class="grid grid-2">';

  // Agenda
  html += '<div class="card"><h2>Agenda del día</h2>';
  data.calendar.forEach(function(ev) {
    html += '<div class="agenda-item"><div class="time">' + escapeHtml(ev.start) + '–' + escapeHtml(ev.end) + '</div>' +
      '<div><div class="title">' + escapeHtml(ev.title) + '</div>' +
      (ev.location ? '<div class="loc">' + escapeHtml(ev.location) + '</div>' : '') +
      '</div></div>';
  });
  html += '<h3>Huecos libres</h3><ul>';
  data.free_slots.forEach(function(s) { html += '<li>' + escapeHtml(s) + '</li>'; });
  html += '</ul>';
  html += '<h3>Agenda ideal sugerida</h3>';
  data.ideal_agenda.forEach(function(s) {
    html += '<div class="agenda-item"><div class="time">' + escapeHtml(s.time) + '</div><div class="title">' + escapeHtml(s.task) + '</div></div>';
  });
  html += '</div>';

  // Clima
  html += '<div class="card"><h2>Clima Barcelona</h2>';
  html += '<div class="weather-grid">' +
    '<div class="weather-stat"><div class="label">Mínima</div><div class="value">' + escapeHtml(data.weather.min) + '</div></div>' +
    '<div class="weather-stat"><div class="label">Máxima</div><div class="value">' + escapeHtml(data.weather.max) + '</div></div>' +
    '<div class="weather-stat"><div class="label">Lluvia</div><div class="value">' + escapeHtml(data.weather.rain) + '</div></div>' +
  '</div>';
  html += '<p style="font-size:13px;margin-top:8px;">' + escapeHtml(data.weather.summary) + '</p>';
  html += '<p style="font-size:13px;color:var(--accent);margin-top:8px;">💡 ' + escapeHtml(data.weather.recommendation) + '</p>';
  html += '<p style="font-size:11px;color:var(--muted);margin-top:8px;">Fuente: ' + escapeHtml(data.weather.source) + '</p>';
  html += '</div>';
  html += '</div>'; // /grid-2

  // Correos
  html += '<div class="card"><h2>Correos prioritarios</h2>';
  if (data.emails_urgent && data.emails_urgent.length) {
    html += '<h3 style="color:var(--red);">A. Muy urgentes</h3>';
    data.emails_urgent.forEach(function(e) { html += renderEmail(e, 'priority-high'); });
  }
  if (data.emails_important && data.emails_important.length) {
    html += '<h3 style="color:var(--orange);">B. Importantes de hoy</h3>';
    data.emails_important.forEach(function(e) { html += renderEmail(e, 'priority-med'); });
  }
  if (data.emails_pending && data.emails_pending.length) {
    html += '<h3 style="color:var(--blue);">C. Pendientes no urgentes</h3>';
    data.emails_pending.forEach(function(e) { html += renderEmail(e, 'priority-low'); });
  }
  html += '<div class="info">📩 Outlook: ' + escapeHtml(data.outlook_status) + '</div>';
  html += '<div class="info">📩 Zoho: ' + escapeHtml(data.zoho_status) + '</div>';
  html += '</div>';

  // Noticias
  html += '<div class="card"><h2>Noticias principales</h2>';
  var sections = [
    {key:'spain', title:'🇪🇸 España'},
    {key:'argentina', title:'🇦🇷 Argentina'},
    {key:'international', title:'🌍 Internacional'},
    {key:'economy', title:'💼 Economía y negocios'}
  ];
  sections.forEach(function(sec) {
    if (data.news[sec.key] && data.news[sec.key].length) {
      html += '<h3>' + sec.title + '</h3>';
      data.news[sec.key].forEach(function(n) {
        html += '<div class="news-item">' +
          '<div class="title">' + escapeHtml(n.title) + '</div>' +
          '<div class="summary">' + escapeHtml(n.summary) + '</div>' +
          '<div class="source">Fuente: ' + escapeHtml(n.source) + '</div>' +
        '</div>';
      });
    }
  });
  html += '</div>';

  // WhatsApp
  html += '<div class="card"><h2>WhatsApp</h2>';
  html += '<div class="info">' + escapeHtml(data.whatsapp_status) + '</div>';
  html += '</div>';

  // Pendientes
  html += '<div class="card"><h2>Pendientes recomendados</h2><ul>';
  data.tasks.forEach(function(t) { html += '<li>' + escapeHtml(t) + '</li>'; });
  html += '</ul></div>';

  document.getElementById('content').innerHTML = html;
}

document.getElementById('loginForm').addEventListener('submit', function(e) {
  e.preventDefault();
  var pwd = document.getElementById('password').value;
  var encrypted = document.getElementById('payload').textContent.trim();
  var errorEl = document.getElementById('error');
  errorEl.textContent = '';
  try {
    var decrypted = CryptoJS.AES.decrypt(encrypted, pwd).toString(CryptoJS.enc.Utf8);
    if (!decrypted) throw new Error('Bad password');
    var data = JSON.parse(decrypted);
    document.getElementById('login').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    renderDashboard(data);
  } catch (err) {
    errorEl.textContent = 'Contraseña incorrecta. Intenta de nuevo.';
    document.getElementById('password').value = '';
    document.getElementById('password').focus();
  }
});
</script>
</body>
