<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Briefing Diario · 2026-04-27</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
<style>
  :root{
    --bg:#0f1420; --bg-2:#161c2c; --card:#1c2336; --card-2:#222a40;
    --ink:#e9ecf2; --ink-soft:#a4adc1; --muted:#7a8298; --line:#2a3350;
    --accent:#4f8cff; --accent-2:#6aa6ff; --gold:#e0b568;
    --high:#e06464; --medium:#e0a155; --low:#6cc28a;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;line-height:1.55;-webkit-font-smoothing:antialiased}
  a{color:var(--accent-2);text-decoration:none}
  a:hover{text-decoration:underline}
  .gate{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .gate-card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:36px 32px;max-width:420px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.35)}
  .gate-card h1{font-size:22px;margin:0 0 6px;letter-spacing:.2px}
  .gate-card .sub{color:var(--muted);font-size:14px;margin-bottom:24px}
  .gate-card input{width:100%;padding:12px 14px;border-radius:10px;border:1px solid var(--line);background:var(--bg-2);color:var(--ink);font-size:15px;outline:none}
  .gate-card input:focus{border-color:var(--accent)}
  .gate-card button{margin-top:14px;width:100%;padding:12px;border:0;border-radius:10px;background:var(--accent);color:#fff;font-weight:600;cursor:pointer;font-size:15px;transition:background .15s}
  .gate-card button:hover{background:var(--accent-2)}
  .gate-error{color:var(--high);font-size:13px;margin-top:12px;min-height:18px}
  .gate-logo{font-size:32px;margin-bottom:6px;color:var(--gold)}
  #content{display:none;max-width:1100px;margin:0 auto;padding:28px 22px 60px}
  .hero{display:flex;justify-content:space-between;align-items:flex-end;gap:18px;flex-wrap:wrap;border-bottom:1px solid var(--line);padding-bottom:18px;margin-bottom:24px}
  .brand{font-size:26px;font-weight:700;letter-spacing:.3px}
  .dateline{color:var(--muted);font-size:14px;margin-top:4px}
  .hero-pill{padding:6px 14px;background:var(--card);border:1px solid var(--line);border-radius:999px;color:var(--ink-soft);font-size:13px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:22px 24px;margin-bottom:20px;box-shadow:0 6px 20px rgba(0,0,0,.18)}
  .card h2{margin:0 0 14px;font-size:18px;letter-spacing:.2px;color:var(--ink);border-left:3px solid var(--accent);padding-left:10px}
  .section-h{margin:14px 0 8px;font-size:14px;text-transform:uppercase;letter-spacing:.8px;color:var(--ink-soft)}
  .bullets{margin:0;padding-left:18px}
  .bullets li{margin:6px 0}
  .bullets.small{font-size:13px}
  .numbered{margin:0;padding-left:20px}
  .numbered li{margin:6px 0}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:24px}
  @media (max-width:760px){.grid2{grid-template-columns:1fr}}
  .email{background:var(--card-2);border:1px solid var(--line);border-radius:10px;padding:14px 16px;margin-bottom:12px}
  .email h4{margin:8px 0 6px;font-size:15px}
  .email p{margin:6px 0;font-size:14px;color:var(--ink-soft)}
  .email p strong{color:var(--ink)}
  .email-head{display:flex;flex-wrap:wrap;gap:8px 14px;align-items:center;font-size:12px;color:var(--muted)}
  .email-head .from{color:var(--ink)}
  .email details{margin-top:8px}
  .email summary{cursor:pointer;color:var(--accent-2);font-size:13px;user-select:none}
  .email pre{background:#0d1220;border:1px solid var(--line);border-radius:8px;padding:12px;white-space:pre-wrap;color:var(--ink-soft);font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12.5px;margin-top:8px}
  .email .quick{font-size:13px;background:rgba(79,140,255,.08);border-left:3px solid var(--accent);padding:8px 10px;border-radius:6px;margin-top:10px}
  .badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:600;letter-spacing:.4px;color:#fff}
  .badge-high{background:var(--high)}
  .badge-medium{background:var(--medium);color:#221a07}
  .badge-low{background:var(--low);color:#0c2415}
  .priority-high{border-left:3px solid var(--high)}
  .priority-medium{border-left:3px solid var(--medium)}
  .priority-low{border-left:3px solid var(--low)}
  .agenda{width:100%;border-collapse:collapse;font-size:14px;margin:6px 0 12px}
  .agenda th,.agenda td{padding:8px 10px;text-align:left;border-bottom:1px solid var(--line)}
  .agenda th{color:var(--ink-soft);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.5px}
  .news{margin:0;padding-left:18px;font-size:14px}
  .news li{margin:6px 0}
  .news em{color:var(--muted);font-style:normal;font-size:12px}
  .weather{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
  @media (max-width:600px){.weather{grid-template-columns:repeat(2,1fr)}}
  .wstat{background:var(--card-2);border:1px solid var(--line);border-radius:10px;padding:12px;text-align:center}
  .wlabel{display:block;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.6px}
  .wval{display:block;font-size:20px;font-weight:600;color:var(--ink);margin-top:4px}
  .todo{margin:0;padding-left:20px;font-size:14px}
  .todo li{margin:8px 0}
  .todo li .badge{margin-right:8px}
  .note{color:var(--muted);font-size:13px;margin:6px 0}
  .note.small{font-size:12px}
  .foot{text-align:center;color:var(--muted);font-size:12px;margin-top:24px}
</style>
</head>

    function tryUnlock(){
      const pwd = document.getElementById('pwd').value;
      const errEl = document.getElementById('gateError');
      errEl.textContent = "";
      try{
        const decrypted = CryptoJS.AES.decrypt(CIPHERTEXT, pwd);
        const txt = decrypted.toString(CryptoJS.enc.Utf8);
        if(!txt || txt.length < 20){
          errEl.textContent = "Contraseña incorrecta";
          return;
        }
        document.getElementById('gate').style.display = 'none';
        const c = document.getElementById('content');
        c.innerHTML = txt;
        c.style.display = 'block';
        document.title = "Briefing Diario · 2026-04-27";
      }catch(e){
        errEl.textContent = "Contraseña incorrecta";
      }
    }
