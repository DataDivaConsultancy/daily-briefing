<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Briefing Diario · 21 abril 2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
<style>
  :root {
    --bg: #0f1419;
    --card: #1a1f2a;
    --card-hover: #222836;
    --text: #e4e8ef;
    --muted: #8894a6;
    --accent: #6ba4ff;
    --accent-soft: rgba(107, 164, 255, 0.12);
    --success: #4ade80;
    --warn: #f59e0b;
    --danger: #ef4444;
    --border: #2a3040;
    --gradient: linear-gradient(135deg, #6ba4ff 0%, #a78bfa 100%);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    line-height: 1.55;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .login-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: radial-gradient(ellipse at top, #1a2340 0%, #0f1419 55%);
  }
  .login-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 48px 36px;
    max-width: 420px;
    width: 100%;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  .logo { font-size: 32px; font-weight: 700; background: var(--gradient); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; }
  .sub { color: var(--muted); font-size: 13px; margin-bottom: 32px; letter-spacing: 0.5px; }
  .login-box input {
    width: 100%;
    padding: 14px 16px;
    font-size: 15px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    margin-bottom: 14px;
    transition: border 0.2s, box-shadow 0.2s;
  }
  .login-box input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .login-box button {
    width: 100%;
    padding: 14px;
    font-size: 15px;
    font-weight: 600;
    background: var(--gradient);
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.2s;
  }
  .login-box button:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(107, 164, 255, 0.3); }
  .error-msg { color: var(--danger); font-size: 13px; margin-top: 12px; min-height: 18px; }

  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 32px 24px 80px;
    display: none;
  }
  .main-header {
    margin-bottom: 28px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  .main-header h1 {
    font-size: 32px;
    font-weight: 700;
    background: var(--gradient);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 6px;
  }
  .date-line { color: var(--muted); font-size: 14px; }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px 28px;
    margin-bottom: 20px;
    transition: border 0.2s;
  }
  .card:hover { border-color: #354060; }
  .card h2 {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 16px;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .card h2::before {
    content: '';
    width: 4px;
    height: 18px;
    background: var(--gradient);
    border-radius: 2px;
  }
  .card h3 {
    font-size: 14px;
    font-weight: 600;
    margin: 18px 0 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }
  .card h3:first-of-type { margin-top: 6px; }
  .muted { color: var(--muted); font-size: 13px; }
  ul, ol { padding-left: 20px; }
  li { margin-bottom: 6px; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* Summary */
  .summary-card { border-left: 3px solid var(--accent); }
  .summary-list li { margin-bottom: 8px; }

  /* Email cards */
  .email-card {
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border);
    border-left: 3px solid var(--muted);
    border-radius: 10px;
    padding: 16px 18px;
    margin-bottom: 12px;
  }
  .email-card.priority-alta { border-left-color: var(--danger); }
  .email-card.priority-media { border-left-color: var(--warn); }
  .email-card.priority-baja { border-left-color: var(--muted); }
  .email-header { display: flex; gap: 10px; align-items: center; margin-bottom: 8px; }
  .email-subject { font-weight: 600; font-size: 15px; margin-bottom: 4px; }
  .email-meta { color: var(--muted); font-size: 12px; margin-bottom: 10px; }
  .email-account { color: var(--muted); font-size: 12px; }
  .field { font-size: 13px; margin-bottom: 4px; }
  .label { color: var(--muted); font-weight: 600; }

  .badge {
    display: inline-block;
    padding: 3px 10px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.8px;
    border-radius: 4px;
    text-transform: uppercase;
  }
  .badge-alta { background: rgba(239,68,68,0.15); color: var(--danger); }
  .badge-media { background: rgba(245,158,11,0.15); color: var(--warn); }
  .badge-baja { background: rgba(136,148,166,0.15); color: var(--muted); }

  /* Agenda table */
  .agenda-table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 8px;
  }
  .agenda-table th, .agenda-table td {
    text-align: left;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
  }
  .agenda-table th {
    color: var(--muted);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    font-weight: 600;
  }
  .time-cell { font-family: 'SF Mono', Menlo, monospace; color: var(--accent); white-space: nowrap; }
  .alert {
    background: rgba(245,158,11,0.08);
    border-left: 3px solid var(--warn);
    padding: 10px 14px;
    border-radius: 6px;
    font-size: 13px;
    margin-bottom: 8px;
  }
  .priority-list li { font-weight: 500; margin-bottom: 8px; }

  /* News grid */
  .news-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
  }
  .news-item {
    background: rgba(255,255,255,0.02);
    padding: 12px 14px;
    border-radius: 8px;
    margin-bottom: 10px;
    border: 1px solid var(--border);
  }
  .news-headline { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
  .news-summary { font-size: 13px; color: #c5ccd8; margin-bottom: 6px; }
  .news-meta { font-size: 11px; display: flex; gap: 10px; flex-wrap: wrap; }
  .impact { color: var(--accent); }

  /* Weather */
  .weather-card { background: linear-gradient(135deg, rgba(107,164,255,0.06) 0%, rgba(167,139,250,0.04) 100%); }
  .weather-main {
    display: flex;
    gap: 32px;
    align-items: center;
    flex-wrap: wrap;
  }
  .temp-display {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 12px 24px;
    background: var(--accent-soft);
    border-radius: 14px;
    min-width: 120px;
  }
  .temp-max { font-size: 42px; font-weight: 700; color: var(--accent); }
  .temp-min { font-size: 18px; color: var(--muted); }
  .weather-info { flex: 1; min-width: 220px; }
  .weather-info p { margin-bottom: 6px; font-size: 14px; }
  .recommendation { color: var(--text); font-style: italic; margin-top: 10px; padding: 10px 14px; background: rgba(255,255,255,0.02); border-radius: 8px; border-left: 2px solid var(--accent); }
  .source { margin-top: 8px; }

  /* Tasks */
  .tasks-card { border-left: 3px solid var(--success); }
  .tasks-list { list-style: none; padding-left: 0; }
  .tasks-list li {
    padding: 8px 0 8px 28px;
    border-bottom: 1px solid var(--border);
    position: relative;
    font-size: 14px;
  }
  .tasks-list li:last-child { border-bottom: none; }
  .tasks-list li::before {
    content: '▸';
    position: absolute;
    left: 8px;
    color: var(--success);
    font-weight: 700;
  }

  .unavailable-card { opacity: 0.85; }
  .unavailable-card ul { list-style: none; padding-left: 0; }
  .unavailable-card li { padding: 6px 0; font-size: 13px; }

  .footer {
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    margin-top: 40px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }

  @media (max-width: 640px) {
    .container { padding: 20px 14px 60px; }
    .card { padding: 18px 18px; border-radius: 12px; }
    .main-header h1 { font-size: 24px; }
    .card h2 { font-size: 16px; }
    .temp-max { font-size: 34px; }
    .weather-main { flex-direction: column; align-items: flex-start; gap: 18px; }
    .temp-display { flex-direction: row; gap: 14px; min-width: 0; }
  }
</style>
</head>
<body>

  <div class="login-box">
    <div class="logo">Briefing Diario</div>
    <div class="sub">ACCESO PRIVADO</div>
    <form id="loginForm" onsubmit="return decryptContent(event)">
      <input type="password" id="passwordInput" placeholder="Contraseña" autocomplete="current-password" required autofocus />
      <button type="submit">Desbloquear</button>
      <div class="error-msg" id="errorMsg"></div>
    </form>
  </div>
</div>

<div class="container" id="contentContainer"></div>

  function decryptContent(event) {
    if (event) event.preventDefault();
    var password = document.getElementById('passwordInput').value;
    var errorMsg = document.getElementById('errorMsg');
    errorMsg.textContent = '';
    try {
      var decrypted = CryptoJS.AES.decrypt(ENCRYPTED_DATA, password);
      var plaintext = decrypted.toString(CryptoJS.enc.Utf8);
      if (!plaintext) throw new Error('bad password');
      document.getElementById('loginScreen').style.display = 'none';
      var container = document.getElementById('contentContainer');
      container.innerHTML = plaintext;
      container.style.display = 'block';
      document.title = 'Briefing Diario · 21 abril 2026';
    } catch (e) {
      errorMsg.textContent = 'Contraseña incorrecta';
      document.getElementById('passwordInput').value = '';
      document.getElementById('passwordInput').focus();
    }
    return false;
  }
