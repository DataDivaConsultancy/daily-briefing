<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Briefing Diario · Horacio Broggi</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
<style>
  :root {
    --bg: #0f1216;
    --bg-elev: #161a21;
    --bg-card: #1b2029;
    --border: #262d3a;
    --text: #e7ecf3;
    --text-dim: #8a93a6;
    --text-faint: #5d6678;
    --accent: #d4af37;
    --accent-dim: #8a7320;
    --urgent: #ef4444;
    --high: #f59e0b;
    --info: #3b82f6;
    --warn: #f97316;
    --low: #6b7280;
    --good: #10b981;
    --shadow: 0 1px 3px rgba(0,0,0,0.4), 0 8px 24px rgba(0,0,0,0.25);
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f4f5f8;
      --bg-elev: #ffffff;
      --bg-card: #ffffff;
      --border: #e3e6ec;
      --text: #1a1f2b;
      --text-dim: #5b6478;
      --text-faint: #8a92a3;
      --accent: #a7841a;
      --accent-dim: #c4a23a;
      --shadow: 0 1px 2px rgba(15,18,22,0.06), 0 8px 24px rgba(15,18,22,0.08);
    }
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", Roboto, "Helvetica Neue", Arial, sans-serif;
    line-height: 1.55;
    font-size: 15px;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  .wrap {
    max-width: 1080px;
    margin: 0 auto;
    padding: 32px 24px 80px;
  }
  /* Gate */
  #gate {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  #gate .gate-box {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 48px 40px;
    max-width: 420px;
    width: 100%;
    text-align: center;
    box-shadow: var(--shadow);
  }
  #gate h1 {
    font-size: 24px;
    margin: 0 0 8px;
    letter-spacing: -0.01em;
    font-weight: 600;
  }
  #gate .subtitle {
    color: var(--text-dim);
    margin-bottom: 32px;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
  }
  #gate .lock {
    font-size: 36px;
    margin-bottom: 16px;
    color: var(--accent);
  }
  #gate input[type="password"] {
    width: 100%;
    padding: 14px 16px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--bg-elev);
    color: var(--text);
    font-size: 15px;
    margin-bottom: 12px;
    transition: border-color 0.15s;
  }
  #gate input[type="password"]:focus {
    outline: none;
    border-color: var(--accent);
  }
  #gate button {
    width: 100%;
    padding: 13px 16px;
    border: none;
    border-radius: 10px;
    background: var(--accent);
    color: #0f1216;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  #gate button:hover { background: var(--accent-dim); color: var(--text); }
  #gate .err {
    color: var(--urgent);
    font-size: 13px;
    margin-top: 12px;
    min-height: 18px;
  }
  /* Content */
  #content { display: none; }
  .header {
    margin-bottom: 32px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  .header h1 {
    margin: 0 0 6px;
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  .header .date {
    color: var(--text-dim);
    font-size: 14px;
    text-transform: capitalize;
  }
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px 28px;
    margin-bottom: 20px;
    box-shadow: var(--shadow);
  }
  .card h2 {
    margin: 0 0 16px;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.005em;
    color: var(--text);
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  .card h3 {
    margin: 20px 0 10px;
    font-size: 14px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-dim);
  }
  .card-meta { background: transparent; box-shadow: none; }
  .card-meta h2 { font-size: 14px; color: var(--text-dim); border-bottom-color: transparent; }
  .card-meta p { color: var(--text-dim); font-size: 13px; }
  ul, ol { padding-left: 20px; margin: 0 0 8px; }
  li { margin-bottom: 6px; }
  ul.exec li { padding-left: 4px; }
  /* Tags */
  .tag {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    padding: 2px 7px;
    border-radius: 4px;
    margin-right: 8px;
    vertical-align: middle;
    text-transform: uppercase;
  }
  .tag-urgent { background: rgba(239,68,68,0.15); color: var(--urgent); border: 1px solid rgba(239,68,68,0.3); }
  .tag-high   { background: rgba(245,158,11,0.15); color: var(--high); border: 1px solid rgba(245,158,11,0.3); }
  .tag-info   { background: rgba(59,130,246,0.15); color: var(--info); border: 1px solid rgba(59,130,246,0.3); }
  .tag-warn   { background: rgba(249,115,22,0.15); color: var(--warn); border: 1px solid rgba(249,115,22,0.3); }
  .tag-low    { background: rgba(107,114,128,0.15); color: var(--low); border: 1px solid rgba(107,114,128,0.3); }
  /* Email cards */
  .bucket {
    margin-top: 20px !important;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }
  .bucket-urgent { color: var(--urgent); }
  .bucket-high { color: var(--high); }
  .bucket-low { color: var(--text-faint); }
  .email {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-left: 3px solid var(--border);
    border-radius: 8px;
    padding: 14px 18px;
    margin-bottom: 12px;
  }
  .email-mini { padding: 10px 14px; }
  .email .email-head { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; font-size: 12px; color: var(--text-dim); margin-bottom: 6px; }
  .email .email-from { font-weight: 600; color: var(--text); }
  .email .email-time { margin-left: auto; font-variant-numeric: tabular-nums; }
  .email .email-subject { font-weight: 600; font-size: 15px; margin-bottom: 6px; }
  .email .email-summary { font-size: 14px; color: var(--text-dim); margin-bottom: 8px; line-height: 1.5; }
  .email .email-action { font-size: 13px; padding: 6px 10px; background: var(--bg-card); border-radius: 6px; border: 1px dashed var(--border); }
  .email details { margin-top: 10px; }
  .email summary { cursor: pointer; font-size: 12px; color: var(--accent); font-weight: 500; }
  .email blockquote {
    border-left: 2px solid var(--accent);
    padding: 8px 14px;
    margin: 10px 0;
    font-size: 13px;
    color: var(--text-dim);
    background: var(--bg-card);
    border-radius: 0 6px 6px 0;
    line-height: 1.6;
  }
  /* Priority left-borders */
  .prio { font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 3px; letter-spacing: 0.05em; }
  .prio-urgent { background: var(--urgent); color: white; }
  .prio-high   { background: var(--high); color: white; }
  .prio-low    { background: var(--low); color: white; }
  .email:has(.prio-urgent) { border-left-color: var(--urgent); }
  .email:has(.prio-high) { border-left-color: var(--high); }
  .email:has(.prio-low) { border-left-color: var(--low); opacity: 0.85; }
  /* Agenda */
  table.agenda { width: 100%; border-collapse: collapse; margin-bottom: 18px; }
  table.agenda th, table.agenda td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); font-size: 14px; }
  table.agenda th { color: var(--text-dim); font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; }
  table.agenda td:first-child { font-variant-numeric: tabular-nums; color: var(--accent); font-weight: 600; white-space: nowrap; }
  /* Grid */
  .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 24px; margin-top: 12px; }
  .grid-2 h3 { margin-top: 0; }
  ul.ideal li { font-size: 14px; }
  ul.news li { font-size: 13.5px; line-height: 1.6; margin-bottom: 10px; color: var(--text-dim); }
  ul.news li b { color: var(--text); }
  ul.news a { color: var(--accent); text-decoration: none; font-size: 12px; white-space: nowrap; }
  ul.news a:hover { text-decoration: underline; }
  /* Weather */
  .weather { display: grid; grid-template-columns: auto 1fr; gap: 24px; align-items: center; }
  .weather-main { text-align: center; padding: 16px 24px; background: var(--bg-elev); border-radius: 10px; border: 1px solid var(--border); }
  .weather-main .temp { font-size: 36px; font-weight: 700; color: var(--accent); font-variant-numeric: tabular-nums; }
  .weather-main .cond { font-size: 12px; color: var(--text-dim); margin-top: 4px; }
  .weather-rec { font-size: 14px; color: var(--text-dim); }
  .weather-source { font-size: 11px; color: var(--text-faint); margin-top: 8px; }
  .weather-source a { color: var(--text-faint); }
  @media (max-width: 600px) { .weather { grid-template-columns: 1fr; text-align: center; } }
  /* Misc */
  code { background: var(--bg-elev); padding: 2px 6px; border-radius: 4px; font-size: 12.5px; border: 1px solid var(--border); font-family: "SF Mono", Menlo, Consolas, monospace; }
  .note { font-size: 12px; color: var(--text-faint); padding: 10px 14px; background: var(--bg-elev); border-left: 3px solid var(--text-faint); border-radius: 0 6px 6px 0; margin-top: 14px; }
  ol.todos li { padding: 8px 4px; border-bottom: 1px dashed var(--border); list-style-position: inside; }
  ol.todos li:last-child { border-bottom: none; }
  /* Footer */
  .footer { text-align: center; color: var(--text-faint); font-size: 11px; margin-top: 24px; }
  .footer a { color: var(--text-dim); }
  /* Responsive */
  @media (max-width: 640px) {
    .wrap { padding: 16px 12px 60px; }
    .card { padding: 18px 16px; border-radius: 10px; }
    .header h1 { font-size: 24px; }
    .card h2 { font-size: 16px; }
  }
</style>
</head>

    e.preventDefault();
