<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>Briefing Diario — 2026-04-29</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
  :root {
    --bg: #f5f6f8;
    --card: #ffffff;
    --ink: #1a1f2c;
    --muted: #6b7280;
    --border: #e5e7eb;
    --accent: #1e3a8a;
    --accent-soft: #dbeafe;
    --urgent: #b91c1c;
    --urgent-soft: #fee2e2;
    --warn: #b45309;
    --warn-soft: #fef3c7;
    --ok: #047857;
    --ok-soft: #d1fae5;
    --shadow: 0 1px 3px rgba(0,0,0,0.05), 0 1px 2px rgba(0,0,0,0.03);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }
  .gate {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: linear-gradient(135deg, #1e3a8a 0%, #312e81 100%);
  }
  .gate-card {
    background: white;
    padding: 40px 32px;
    border-radius: 12px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.25);
    width: 100%;
    max-width: 380px;
    text-align: center;
  }
  .gate-card h1 {
    margin: 0 0 8px;
    font-size: 22px;
    color: var(--accent);
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  .gate-card .sub {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 28px;
  }
  .gate-card input {
    width: 100%;
    padding: 12px 14px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 15px;
    margin-bottom: 12px;
    transition: border 0.2s;
  }
  .gate-card input:focus {
    outline: none;
    border-color: var(--accent);
  }
  .gate-card button {
    width: 100%;
    padding: 12px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  .gate-card button:hover { background: #1e40af; }
  .gate-error {
    color: var(--urgent);
    font-size: 13px;
    margin-top: 12px;
    min-height: 18px;
  }
  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 24px 20px 60px;
  }
  header.topbar {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  header.topbar h1 {
    margin: 0;
    font-size: 26px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -0.02em;
  }
  header.topbar .meta {
    color: var(--muted);
    font-size: 14px;
  }
  .grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 16px;
  }
  @media (min-width: 900px) {
    .grid-2 { grid-template-columns: 2fr 1fr; }
  }
  .card {
    background: var(--card);
    border-radius: 12px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    padding: 20px 22px;
    margin-bottom: 16px;
  }
  .card h2 {
    margin: 0 0 14px;
    font-size: 17px;
    font-weight: 700;
    color: var(--ink);
    display: flex;
    align-items: center;
    gap: 10px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }
  .card h2 .badge {
    background: var(--accent-soft);
    color: var(--accent);
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 999px;
    font-weight: 600;
    letter-spacing: 0.02em;
  }
  .card h3 {
    font-size: 14px;
    font-weight: 700;
    margin: 16px 0 8px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  ul.bullets {
    margin: 0;
    padding-left: 18px;
  }
  ul.bullets li { margin-bottom: 6px; }
  .email {
    border-left: 3px solid var(--border);
    padding: 10px 14px;
    margin-bottom: 14px;
    background: #fafbfc;
    border-radius: 0 8px 8px 0;
  }
  .email.high { border-left-color: var(--urgent); background: var(--urgent-soft); }
  .email.med { border-left-color: var(--warn); background: var(--warn-soft); }
  .email.low { border-left-color: var(--ok); }
  .email .from {
    font-weight: 600;
    font-size: 14px;
  }
  .email .subj {
    font-size: 14px;
    color: var(--ink);
    margin: 4px 0;
  }
  .email .date { font-size: 12px; color: var(--muted); }
  .email .summary { font-size: 13px; margin: 8px 0; line-height: 1.5; }
  .email .reply {
    background: white;
    padding: 10px 12px;
    border-radius: 6px;
    font-size: 13px;
    margin-top: 8px;
    border: 1px dashed var(--border);
    white-space: pre-wrap;
  }
  .pri-tag {
    display: inline-block;
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 4px;
    margin-left: 6px;
    font-weight: 700;
    letter-spacing: 0.04em;
  }
  .pri-tag.alta { background: var(--urgent); color: white; }
  .pri-tag.media { background: var(--warn); color: white; }
  .pri-tag.baja { background: var(--ok); color: white; }
  .agenda-row {
    display: flex;
    gap: 14px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .agenda-row:last-child { border-bottom: none; }
  .agenda-row .time {
    font-weight: 600;
    color: var(--accent);
    min-width: 110px;
    font-variant-numeric: tabular-nums;
    font-size: 14px;
  }
  .agenda-row .what { font-size: 14px; }
  .agenda-row .where { font-size: 12px; color: var(--muted); }
  .news-item {
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .news-item:last-child { border-bottom: none; }
  .news-item .src {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .news-item .head {
    font-weight: 600;
    font-size: 14px;
    margin: 4px 0;
  }
  .news-item .sum { font-size: 13px; color: var(--ink); }
  .news-item .impact {
    font-size: 12px;
    color: var(--accent);
    margin-top: 4px;
    font-style: italic;
  }
  .weather-stat {
    display: flex;
    gap: 24px;
    align-items: baseline;
    margin-bottom: 8px;
  }
  .weather-stat .temp {
    font-size: 32px;
    font-weight: 700;
    color: var(--accent);
  }
  .weather-stat .desc {
    font-size: 14px;
    color: var(--muted);
  }
  .checklist li {
    list-style: none;
    padding: 8px 0;
    border-bottom: 1px dashed var(--border);
    font-size: 14px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }
  .checklist li:last-child { border: none; }
  .checklist li::before {
    content: "□";
    color: var(--muted);
    font-weight: 700;
    font-size: 18px;
    line-height: 1;
  }
  .missing {
    background: var(--warn-soft);
    color: #78350f;
    padding: 10px 14px;
    border-radius: 6px;
    font-size: 13px;
    border-left: 3px solid var(--warn);
  }
  .footer-meta {
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    margin-top: 30px;
  }
  .top-pri-list {
    counter-reset: pri;
    padding: 0;
    list-style: none;
    margin: 0;
  }
  .top-pri-list li {
    counter-increment: pri;
    padding: 10px 0 10px 38px;
    position: relative;
    font-size: 14px;
    border-bottom: 1px solid var(--border);
  }
  .top-pri-list li:last-child { border: none; }
  .top-pri-list li::before {
    content: counter(pri);
    position: absolute;
    left: 0;
    top: 8px;
    background: var(--accent);
    color: white;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 13px;
  }
  @media (max-width: 600px) {
    .container { padding: 16px 14px 40px; }
    .agenda-row { flex-direction: column; gap: 4px; }
    .agenda-row .time { min-width: auto; }
    header.topbar h1 { font-size: 22px; }
  }
</style>
</head>

</div>

<script>
const ENC = document.getElementById('ciphertext').textContent.trim();

function tryUnlock() {
  const pwd = document.getElementById('pwd').value;
  const err = document.getElementById('err');
  err.textContent = '';
  try {
    const dec = CryptoJS.AES.decrypt(ENC, pwd);
    const txt = dec.toString(CryptoJS.enc.Utf8);
    if (!txt) throw new Error('bad');
    const data = JSON.parse(txt);
    const briefing = JSON.parse(data.json);
    render(briefing);
    document.getElementById('gate').style.display = 'none';
    document.getElementById('content').style.display = 'block';
  } catch (e) {
    err.textContent = 'Contraseña incorrecta. Inténtalo de nuevo.';
    document.getElementById('pwd').select();
  }
}

document.getElementById('unlock').addEventListener('click', tryUnlock);
document.getElementById('pwd').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') tryUnlock();
});

function esc(s) {
  return String(s||'').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
}

function priClass(p) {
  p = (p||'').toLowerCase();
  if (p.includes('alta')) return 'alta';
  if (p.includes('media')) return 'media';
  return 'baja';
}

function emailClass(p) {
  p = (p||'').toLowerCase();
  if (p.includes('alta')) return 'high';
  if (p.includes('media')) return 'med';
  return 'low';
}

function fmtTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit', timeZone:'Europe/Madrid'});
}

function render(b) {
  const d = document.getElementById('dashboard');
  let html = '';

  // Resumen ejecutivo
  html += '<div class="card"><h2>Resumen ejecutivo <span class="badge">HOY</span></h2><ul class="bullets">';
  (b.executive_summary||[]).forEach(s => html += `<li>${esc(s)}</li>`);
  html += '</ul></div>';

  // 3 prioridades
  html += '<div class="card"><h2>3 Prioridades del día <span class="badge">CRÍTICO</span></h2><ol class="top-pri-list">';
  (b.top_priorities||[]).forEach(p => html += `<li>${esc(p)}</li>`);
  html += '</ol></div>';

  // Grid: emails + agenda/clima
  html += '<div class="grid grid-2">';

  // Emails
  html += '<div><div class="card"><h2>Correos prioritarios</h2>';
  (b.emails||[]).forEach(e => {
    html += `<div class="email ${emailClass(e.priority)}">
      <div class="from">${esc(e.sender)} <span class="pri-tag ${priClass(e.priority)}">${esc(e.priority)}</span></div>
      <div class="subj"><strong>${esc(e.subject)}</strong></div>
      <div class="date">${esc(e.account)} · ${esc(e.datetime)}</div>
      <div class="summary">${esc(e.summary)}</div>
      <div><strong>Acción:</strong> ${esc(e.recommended_action)}</div>
      ${e.draft_reply ? `<div class="reply"><strong>Borrador:</strong>\n${esc(e.draft_reply)}</div>` : ''}
      ${e.quick_reply ? `<div style="font-size:12px;margin-top:6px;color:var(--muted);"><em>Respuesta rápida:</em> "${esc(e.quick_reply)}"</div>` : ''}
    </div>`;
  });
  html += '</div></div>';

  // Sidebar
  html += '<div>';

  // Agenda
  html += '<div class="card"><h2>Agenda</h2>';
  if ((b.calendar||[]).length === 0) {
    html += '<p style="color:var(--muted);font-size:13px;">Sin eventos.</p>';
  } else {
    (b.calendar||[]).forEach(e => {
      html += `<div class="agenda-row">
        <div class="time">${fmtTime(e.start)}–${fmtTime(e.end)}</div>
        <div><div class="what">${esc(e.title)}</div>
        <div class="where">${esc(e.account)}${e.location ? ' · '+esc(e.location) : ''}</div></div>
      </div>`;
    });
  }
  if ((b.free_slots||[]).length) {
    html += '<h3>Huecos libres</h3><ul class="bullets" style="font-size:13px;">';
    b.free_slots.forEach(s => html += `<li>${esc(s)}</li>`);
    html += '</ul>';
  }
  html += '</div>';

  // Clima
  if (b.weather) {
    const w = b.weather;
    html += `<div class="card"><h2>Clima · ${esc(w.city)}</h2>
      <div class="weather-stat">
        <span class="temp">${esc(w.min_temp)} / ${esc(w.max_temp)}</span>
        <span class="desc">Lluvia ${esc(w.rain_probability)}</span>
      </div>
      <p style="font-size:13px;margin:8px 0;">${esc(w.summary)}</p>
      <p style="font-size:13px;color:var(--accent);margin:8px 0;"><strong>👉</strong> ${esc(w.recommendation)}</p>
      <p style="font-size:11px;color:var(--muted);margin:0;">Fuente: ${esc(w.source)}</p>
    </div>`;
  }

  html += '</div></div>'; // end grid

  // Noticias
  html += '<div class="card"><h2>Noticias del día</h2>';
  ['España','Argentina','Internacional','Economía y negocios'].forEach(sec => {
    const items = (b.news||[]).filter(n => (n.section||'').toLowerCase().includes(sec.toLowerCase().split(' ')[0]));
    if (items.length) {
      html += `<h3>${esc(sec)}</h3>`;
      items.forEach(n => {
        html += `<div class="news-item">
          <div class="src">${esc(n.source)}</div>
          <div class="head">${esc(n.headline)}</div>
          <div class="sum">${esc(n.summary)}</div>
          ${n.business_impact ? `<div class="impact">Impacto: ${esc(n.business_impact)}</div>` : ''}
        </div>`;
      });
    }
  });
  html += '</div>';

  // Pendientes
  html += '<div class="card"><h2>Pendientes recomendados</h2><ul class="checklist">';
  (b.recommended_tasks||[]).forEach(t => html += `<li>${esc(t)}</li>`);
  html += '</ul></div>';

  // WhatsApp
  if (b.whatsapp && b.whatsapp.length) {
    html += '<div class="card"><h2>WhatsApp</h2>';
    b.whatsapp.forEach(w => {
      html += `<p style="font-size:13px;"><strong>${esc(w.chat)}</strong>: ${esc(w.summary)}</p>`;
    });
    html += '</div>';
  }

  // Missing sources
  if (b.missing_sources && b.missing_sources.length) {
    html += '<div class="card"><h2>Fuentes no disponibles</h2>';
    b.missing_sources.forEach(m => html += `<div class="missing" style="margin-bottom:8px;">${esc(m)}</div>`);
    html += '</div>';
  }

  d.innerHTML = html;
}
</script>
</body>
</html>
