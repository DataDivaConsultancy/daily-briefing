<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Briefing Diario</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d1117;
  --bg-elev: #161b22;
  --bg-card: #1c232c;
  --border: #2d333b;
  --text: #e6edf3;
  --text-muted: #8b949e;
  --accent: #58a6ff;
  --accent-warm: #f0883e;
  --critical: #f85149;
  --high: #d29922;
  --medium: #58a6ff;
  --low: #6e7681;
  --success: #3fb950;
  --shadow: 0 4px 20px rgba(0,0,0,0.4);
}
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", system-ui, sans-serif;
  background: linear-gradient(180deg, #0d1117 0%, #161b22 100%);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  line-height: 1.5;
}
.gate {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 24px;
  text-align: center;
}
.gate-logo {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.5px;
  margin-bottom: 8px;
  background: linear-gradient(90deg, #58a6ff, #a371f7);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}
.gate-sub {
  color: var(--text-muted);
  margin-bottom: 32px;
  font-size: 14px;
}
.gate-form {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 32px;
  max-width: 380px;
  width: 100%;
  box-shadow: var(--shadow);
}
.gate-form input[type="password"] {
  width: 100%;
  padding: 12px 16px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--text);
  font-size: 15px;
  margin-bottom: 16px;
  outline: none;
  transition: border-color 0.2s;
}
.gate-form input[type="password"]:focus {
  border-color: var(--accent);
}
.gate-form button {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: none;
  background: var(--accent);
  color: white;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s;
}
.gate-form button:hover { opacity: 0.9; }
.gate-error {
  color: var(--critical);
  font-size: 13px;
  margin-top: 12px;
  min-height: 18px;
}

/* Briefing content */
.container {
  max-width: 980px;
  margin: 0 auto;
  padding: 32px 20px 80px;
}
.header {
  text-align: center;
  margin-bottom: 40px;
  padding-bottom: 24px;
  border-bottom: 1px solid var(--border);
}
.header h1 {
  font-size: 36px;
  font-weight: 700;
  letter-spacing: -1px;
  background: linear-gradient(90deg, #58a6ff, #a371f7);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  margin-bottom: 8px;
}
.date-line {
  color: var(--text-muted);
  font-size: 14px;
}
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px;
  margin-bottom: 20px;
  box-shadow: var(--shadow);
}
.card h2 {
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 1px solid var(--border);
  padding-bottom: 12px;
}
.card h2 .icon {
  color: var(--accent);
  font-size: 20px;
}
.card h3.subsection {
  font-size: 14px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-muted);
  margin-top: 20px;
  margin-bottom: 12px;
}
.card h3.subsection.urgent { color: var(--critical); }
.card h3.subsection.important { color: var(--high); }
.card h3.subsection.low { color: var(--low); }

.summary ul, .news-list, .sources-list { list-style: none; }
.summary ul li, .news-list li, .sources-list li {
  padding: 8px 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.summary ul li:last-child, .news-list li:last-child, .sources-list li:last-child { border-bottom: none; }

.priority-list, .todo-list { list-style: none; counter-reset: item; }
.priority-list li, .todo-list li {
  padding: 10px 0;
  display: flex;
  align-items: center;
  gap: 12px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.priority-list li:before {
  counter-increment: item;
  content: counter(item);
  background: var(--accent);
  color: white;
  border-radius: 50%;
  width: 26px; height: 26px;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700;
  flex-shrink: 0;
}
.todo-list li:before {
  counter-increment: item;
  content: "□";
  color: var(--text-muted);
  font-size: 18px;
  flex-shrink: 0;
}

.badge {
  display: inline-block;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.5px;
  padding: 3px 8px;
  border-radius: 4px;
  text-transform: uppercase;
  flex-shrink: 0;
}
.badge.critical { background: rgba(248,81,73,0.15); color: var(--critical); border: 1px solid rgba(248,81,73,0.3); }
.badge.high { background: rgba(210,153,34,0.15); color: var(--high); border: 1px solid rgba(210,153,34,0.3); }
.badge.medium { background: rgba(88,166,255,0.15); color: var(--medium); border: 1px solid rgba(88,166,255,0.3); }
.badge.low { background: rgba(110,118,129,0.15); color: var(--low); border: 1px solid rgba(110,118,129,0.3); }

.email {
  background: var(--bg-elev);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px;
  margin-bottom: 12px;
}
.email.muted { opacity: 0.7; }
.email-head {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 10px;
  margin-bottom: 6px;
  font-size: 13px;
}
.email-from { color: var(--text); font-weight: 600; }
.email-date { color: var(--text-muted); margin-left: auto; }
.email-subject { font-size: 15px; font-weight: 600; margin: 6px 0 10px; }
.email-body { font-size: 14px; color: var(--text-muted); }
.email-body p { margin-bottom: 6px; }
.email-body strong { color: var(--text); }
.email-body details { margin-top: 8px; }
.email-body details summary { cursor: pointer; color: var(--accent); font-size: 13px; }
.email-body blockquote {
  margin-top: 8px;
  padding: 12px;
  border-left: 3px solid var(--accent);
  background: rgba(88,166,255,0.05);
  border-radius: 4px;
  font-style: italic;
  font-size: 13px;
}

table.schedule {
  width: 100%;
  border-collapse: collapse;
  margin-top: 12px;
  font-size: 14px;
}
table.schedule th, table.schedule td {
  text-align: left;
  padding: 10px 8px;
  border-bottom: 1px solid var(--border);
}
table.schedule th {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-muted);
  font-weight: 600;
}
table.schedule tr.free td { color: var(--success); }
.note { font-size: 13px; color: var(--text-muted); margin-top: 12px; }
.agenda-ideal { list-style: none; margin-top: 8px; }
.agenda-ideal li { padding: 6px 0; font-size: 14px; color: var(--text-muted); }
.agenda-ideal strong { color: var(--accent); display: inline-block; min-width: 110px; }

.weather-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 16px;
}
.weather-stat {
  background: var(--bg-elev);
  border-radius: 8px;
  padding: 16px;
  text-align: center;
}
.stat-num {
  font-size: 22px;
  font-weight: 700;
  color: var(--accent-warm);
  margin-bottom: 4px;
}
.stat-label {
  font-size: 11px;
  text-transform: uppercase;
  color: var(--text-muted);
  letter-spacing: 0.5px;
}
.recommendation {
  background: rgba(88,166,255,0.05);
  border-left: 3px solid var(--accent);
  padding: 10px 14px;
  border-radius: 4px;
  font-size: 14px;
  margin-top: 8px;
}
.source { font-size: 12px; color: var(--text-muted); margin-top: 8px; }

.warn {
  background: rgba(210,153,34,0.1);
  border-left: 3px solid var(--high);
  padding: 10px 14px;
  border-radius: 4px;
  font-size: 14px;
}

.sources-list a {
  color: var(--accent);
  text-decoration: none;
  font-size: 14px;
}
.sources-list a:hover { text-decoration: underline; }

.footer {
  text-align: center;
  padding: 32px 16px;
  color: var(--text-muted);
  font-size: 12px;
  border-top: 1px solid var(--border);
  margin-top: 40px;
}

@media (max-width: 600px) {
  .header h1 { font-size: 26px; }
  .container { padding: 16px 12px 60px; }
  .card { padding: 16px; }
  .weather-grid { grid-template-columns: 1fr 1fr; }
  .weather-grid .weather-stat:last-child { grid-column: 1 / -1; }
  .email-date { margin-left: 0; width: 100%; }
}

#hidden { display: none; }
</style>
</head>
<body>

<div id="gate" class="gate">
  <div class="gate-form">
    <div class="gate-logo">Briefing Diario</div>
    <div class="gate-sub">Acceso privado · Horacio Broggi</div>
    <form id="passForm" onsubmit="return tryUnlock(event)">
      <input type="password" id="pass" placeholder="Contraseña" autofocus autocomplete="current-password">
      <button type="submit">Acceder</button>
      <div class="gate-error" id="err"></div>
    </form>
  </div>
</div>

<div id="hidden"></div>

function tryUnlock(e) {
  e.preventDefault();
  const pwd = document.getElementById('pass').value;
  const errEl = document.getElementById('err');
  errEl.textContent = "";
  try {
    const decrypted = CryptoJS.AES.decrypt(ENCRYPTED, pwd).toString(CryptoJS.enc.Utf8);
    if (!decrypted || decrypted.indexOf('<div class="container">') === -1) {
      errEl.textContent = "Contraseña incorrecta.";
      return false;
    }
    document.getElementById('gate').style.display = 'none';
    const target = document.getElementById('hidden');
    target.innerHTML = decrypted;
    target.style.display = 'block';
    return false;
  } catch (e) {
    errEl.textContent = "Contraseña incorrecta.";
    return false;
  }
}
