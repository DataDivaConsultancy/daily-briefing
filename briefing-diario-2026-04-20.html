<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Briefing Diario - 20 abril 2026</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f7; color: #1d1d1f; line-height: 1.6; }
    
    /* Login Screen */
    .login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; }
    .login-box { background: white; border-radius: 16px; padding: 3rem; box-shadow: 0 4px 24px rgba(0,0,0,0.08); max-width: 400px; width: 100%; text-align: center; }
    .login-box h1 { font-size: 1.8rem; margin-bottom: 0.5rem; color: #1d1d1f; }
    .login-box p { color: #86868b; margin-bottom: 2rem; }
    .login-box input { width: 100%; padding: 12px 16px; border: 1px solid #d2d2d7; border-radius: 8px; font-size: 1rem; margin-bottom: 1rem; outline: none; transition: border-color 0.2s; }
    .login-box input:focus { border-color: #0071e3; }
    .login-box button { width: 100%; padding: 12px; background: #0071e3; color: white; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; transition: background 0.2s; }
    .login-box button:hover { background: #0077ED; }
    .error-msg { color: #ff3b30; font-size: 0.9rem; margin-top: 0.5rem; display: none; }
    
    /* Dashboard */
    .dashboard { display: none; max-width: 1200px; margin: 0 auto; padding: 2rem; }
    .dash-header { background: linear-gradient(135deg, #1d1d1f 0%, #2c2c2e 100%); color: white; border-radius: 16px; padding: 2rem; margin-bottom: 2rem; }
    .dash-header h1 { font-size: 2rem; }
    .dash-header .date { color: #a1a1a6; margin-top: 0.5rem; }
    
    section { background: white; border-radius: 16px; padding: 2rem; margin-bottom: 1.5rem; box-shadow: 0 2px 12px rgba(0,0,0,0.04); }
    h2 { font-size: 1.4rem; margin-bottom: 1.2rem; color: #1d1d1f; border-bottom: 2px solid #f5f5f7; padding-bottom: 0.5rem; }
    h3 { font-size: 1.1rem; margin: 1.2rem 0 0.8rem; color: #48484a; }
    
    /* Summary Grid */
    .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1rem; }
    .summary-card { padding: 1rem 1.2rem; border-radius: 12px; border-left: 4px solid #d2d2d7; background: #fafafa; display: flex; align-items: center; gap: 0.8rem; }
    .summary-card.priority-high { border-left-color: #ff3b30; background: #fff5f5; }
    .summary-card.priority-medium { border-left-color: #ff9500; background: #fffbf5; }
    .summary-card.priority-low { border-left-color: #34c759; background: #f5fff7; }
    .card-icon { font-size: 1.5rem; }
    .summary-card p { font-size: 0.9rem; }
    
    /* Email Cards */
    .email-card { border: 1px solid #e5e5ea; border-radius: 12px; padding: 1.2rem; margin-bottom: 1rem; transition: box-shadow 0.2s; }
    .email-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.06); }
    .email-card.priority-high { border-left: 4px solid #ff3b30; }
    .email-card.priority-medium { border-left: 4px solid #ff9500; }
    .email-card.priority-low { border-left: 4px solid #8e8e93; }
    .email-header { display: flex; align-items: center; gap: 0.8rem; margin-bottom: 0.5rem; font-size: 0.85rem; }
    .email-badge { padding: 2px 8px; border-radius: 4px; font-weight: 600; font-size: 0.75rem; }
    .badge-alta { background: #ff3b30; color: white; }
    .badge-media { background: #ff9500; color: white; }
    .badge-baja { background: #8e8e93; color: white; }
    .email-account { color: #86868b; }
    .email-time { color: #86868b; margin-left: auto; }
    .email-card h4 { font-size: 1rem; margin-bottom: 0.3rem; }
    .email-sender { font-size: 0.85rem; color: #86868b; margin-bottom: 0.5rem; }
    .email-summary { font-size: 0.9rem; color: #48484a; }
    .email-action { font-size: 0.85rem; margin-top: 0.5rem; color: #0071e3; }
    
    /* Timeline */
    .timeline { position: relative; padding-left: 1rem; }
    .timeline-item { display: flex; gap: 1.2rem; padding: 1rem 0; border-bottom: 1px solid #f5f5f7; }
    .timeline-item:last-child { border-bottom: none; }
    .time-block { min-width: 110px; font-weight: 600; font-size: 0.9rem; color: #48484a; }
    .event-details h4 { font-size: 1rem; }
    .event-details p { font-size: 0.85rem; color: #86868b; }
    .timeline-item.priority-high .time-block { color: #ff3b30; }
    .timeline-item.priority-medium .time-block { color: #ff9500; }
    .timeline-item.free-slot { opacity: 0.6; }
    .conflicts-box { background: #fff5f5; border: 1px solid #ffcdd2; border-radius: 8px; padding: 1rem; margin-top: 1rem; }
    .conflicts-box h4 { color: #ff3b30; font-size: 0.9rem; margin-bottom: 0.3rem; }
    .conflicts-box p { font-size: 0.85rem; }
    
    /* News */
    .news-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1rem; }
    .news-card { padding: 1.2rem; border-radius: 12px; border: 1px solid #e5e5ea; }
    .news-tag { font-size: 0.75rem; font-weight: 600; padding: 2px 8px; border-radius: 4px; }
    .news-intl .news-tag { background: #e3f2fd; color: #1565c0; }
    .news-spain .news-tag { background: #fce4ec; color: #c62828; }
    .news-econ .news-tag { background: #e8f5e9; color: #2e7d32; }
    .news-latam .news-tag { background: #fff3e0; color: #e65100; }
    .news-card h4 { margin: 0.6rem 0 0.4rem; font-size: 0.95rem; }
    .news-card p { font-size: 0.85rem; color: #48484a; }
    .business-impact { color: #0071e3 !important; font-weight: 500; margin-top: 0.4rem; }
    
    /* Weather */
    .weather-card { display: flex; align-items: center; gap: 2rem; flex-wrap: wrap; }
    .weather-main { display: flex; align-items: center; gap: 1rem; }
    .weather-icon { font-size: 3rem; }
    .temp-max { font-size: 2rem; font-weight: 700; }
    .temp-min { font-size: 1.2rem; color: #86868b; margin-left: 0.5rem; }
    .weather-details p { font-size: 0.9rem; margin-bottom: 0.3rem; }
    
    /* Tasks */
    .task-list { padding-left: 1.5rem; }
    .task-list li { padding: 0.6rem 0; font-size: 0.95rem; }
    .task-high { color: #ff3b30; font-weight: 500; }
    .task-medium { color: #ff9500; }
    
    /* Sources */
    .sources-grid { display: flex; flex-wrap: wrap; gap: 0.8rem; margin-bottom: 1rem; }
    .sources-grid a { padding: 6px 12px; background: #f5f5f7; border-radius: 6px; text-decoration: none; color: #0071e3; font-size: 0.85rem; }
    .sources-grid a:hover { background: #e5e5ea; }
    .unavailable-sources { background: #f5f5f7; border-radius: 8px; padding: 1rem; }
    .unavailable-sources h4 { font-size: 0.85rem; color: #86868b; margin-bottom: 0.3rem; }
    .unavailable-sources p { font-size: 0.85rem; color: #86868b; }
    .unavailable-box { background: #fff3e0; border-radius: 8px; padding: 1rem; }
    .unavailable-box p { font-size: 0.9rem; color: #e65100; }
    
    @media (max-width: 768px) {
      .dashboard { padding: 1rem; }
      section { padding: 1.5rem; }
      .summary-grid { grid-template-columns: 1fr; }
      .news-grid { grid-template-columns: 1fr; }
      .weather-card { flex-direction: column; align-items: flex-start; }
      .timeline-item { flex-direction: column; gap: 0.3rem; }
    }
  </style>
</head>

    function decrypt() {
      var password = document.getElementById('password-input').value;
      try {
        var bytes = CryptoJS.AES.decrypt(encryptedData, password);
        var decrypted = bytes.toString(CryptoJS.enc.Utf8);
        if (!decrypted || decrypted.length < 10) {
          document.getElementById('error-msg').style.display = 'block';
          return;
        }
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('content-area').innerHTML = decrypted;
        document.getElementById('content-area').querySelector('.dashboard').style.display = 'block';
      } catch(e) {
        document.getElementById('error-msg').style.display = 'block';
      }
    }
  </script>
