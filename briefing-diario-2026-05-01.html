<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>Briefing Diario · 2026-05-01</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
<style>
:root {
  --bg: #f5f5f0;
  --card-bg: #ffffff;
  --text: #1a1a1a;
  --muted: #6b6b6b;
  --line: #e5e5dc;
  --accent: #8b3a1f;
  --accent-soft: #f3e6df;
  --red: #b03333;
  --red-bg: #fbe9e9;
  --amber: #b07a1f;
  --amber-bg: #fbf3e0;
  --blue: #1f4c7a;
  --blue-bg: #e3eef9;
  --green: #2e6b3f;
  --grey-bg: #efefe9;
}
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.55;
  font-size: 15px;
}
.lock-screen {
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 24px;
}
.lock-card {
  background: var(--card-bg);
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 40px 36px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.05);
  max-width: 420px; width: 100%;
  text-align: center;
}
.lock-card h1 {
  font-size: 26px; font-weight: 600; margin: 0 0 6px;
  letter-spacing: -0.01em;
}
.lock-card .sub { color: var(--muted); font-size: 13px; margin-bottom: 28px; }
.lock-card input[type="password"] {
  width: 100%; padding: 12px 14px; border: 1px solid var(--line);
  border-radius: 8px; font-size: 15px; font-family: inherit;
  background: #fafaf6; color: var(--text);
  outline: none; transition: border-color .15s;
}
.lock-card input[type="password"]:focus { border-color: var(--accent); }
.lock-card button {
  width: 100%; margin-top: 12px; padding: 12px;
  background: var(--accent); color: #fff; border: 0; border-radius: 8px;
  font-size: 15px; font-weight: 500; cursor: pointer;
  transition: opacity .15s;
}
.lock-card button:hover { opacity: 0.92; }
.lock-card .error {
  margin-top: 14px; color: var(--red); font-size: 13px; min-height: 16px;
}
.lock-card .lock-icon {
  font-size: 32px; margin-bottom: 12px; color: var(--accent);
}
#content { display: none; }
.briefing-container {
  max-width: 980px; margin: 0 auto; padding: 32px 24px 64px;
}
.hero {
  background: linear-gradient(135deg, #2a2a28 0%, #4a3327 100%);
  color: #fff;
  padding: 36px 32px;
  border-radius: 14px;
  margin-bottom: 24px;
}
.hero h1 {
  font-size: 32px; margin: 0 0 6px;
  font-weight: 600; letter-spacing: -0.02em;
}
.hero-meta { color: #d4c8be; font-size: 14px; margin: 0; }
.card {
  background: var(--card-bg);
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 24px 28px;
  margin-bottom: 18px;
}
.card h2 {
  font-size: 20px; margin: 0 0 16px;
  font-weight: 600; color: var(--accent);
  border-bottom: 2px solid var(--accent-soft);
  padding-bottom: 8px;
}
.card h3 { font-size: 16px; margin: 18px 0 8px; font-weight: 600; }
.card h4 { font-size: 15px; margin: 0 0 4px; font-weight: 600; }
.bullets { padding-left: 20px; margin: 8px 0; }
.bullets li { margin-bottom: 8px; }
.bullets.compact li { margin-bottom: 4px; }
.tag {
  display: inline-block; padding: 2px 8px; border-radius: 4px;
  font-size: 11px; font-weight: 600; margin-right: 6px;
  letter-spacing: 0.03em; text-transform: uppercase;
}
.tag-red { background: var(--red-bg); color: var(--red); }
.tag-amber { background: var(--amber-bg); color: var(--amber); }
.tag-blue { background: var(--blue-bg); color: var(--blue); }
.tag-grey { background: var(--grey-bg); color: var(--muted); }
.group-title {
  margin-top: 22px; padding: 6px 12px; border-radius: 6px;
  display: inline-block;
}
.group-red { background: var(--red-bg); color: var(--red); }
.group-amber { background: var(--amber-bg); color: var(--amber); }
.group-grey { background: var(--grey-bg); color: var(--muted); }
.email {
  border: 1px solid var(--line);
  border-left: 3px solid var(--accent);
  border-radius: 8px;
  padding: 14px 18px;
  margin: 10px 0;
  background: #fcfbf8;
}
.email-head {
  display: flex; gap: 8px; align-items: center;
  font-size: 12px; color: var(--muted); margin-bottom: 6px;
  flex-wrap: wrap;
}
.priority {
  padding: 2px 8px; border-radius: 4px; font-weight: 600;
  font-size: 11px; letter-spacing: 0.03em;
}
.priority-high { background: var(--red-bg); color: var(--red); }
.priority-medium { background: var(--amber-bg); color: var(--amber); }
.priority-low { background: var(--grey-bg); color: var(--muted); }
.account, .date { font-size: 12px; color: var(--muted); }
.from { font-size: 13px; color: var(--muted); margin: 4px 0; }
.email details {
  margin-top: 8px; padding: 8px 0; border-top: 1px dashed var(--line);
}
.email summary {
  cursor: pointer; color: var(--accent); font-size: 13px; font-weight: 500;
}
.email blockquote {
  margin: 10px 0; padding: 10px 14px;
  background: var(--accent-soft); border-radius: 6px;
  font-size: 14px; line-height: 1.5;
}
.quick { font-size: 13px; color: var(--muted); margin: 4px 0 0; }
.note, .warning {
  padding: 10px 14px; border-radius: 6px;
  font-size: 13px; margin-top: 12px;
}
.note { background: var(--grey-bg); color: var(--muted); }
.warning { background: var(--amber-bg); color: var(--amber); }
.schedule { display: flex; flex-direction: column; gap: 8px; }
.event {
  display: flex; gap: 16px; padding: 10px 14px;
  border-left: 3px solid var(--blue); background: #f9faf6;
  border-radius: 0 8px 8px 0;
}
.event.conflict { border-left-color: var(--red); background: var(--red-bg); }
.event .time {
  font-weight: 600; font-size: 13px; color: var(--blue);
  min-width: 110px; flex-shrink: 0;
}
.event.conflict .time { color: var(--red); }
.event-body h4 { margin: 0 0 2px; font-size: 14px; }
.event-body p { margin: 0; font-size: 13px; color: var(--muted); }
.muted { color: var(--muted); font-weight: normal; }
.small { font-size: 12px; }
.conflict-label {
  background: var(--red); color: #fff; padding: 1px 6px;
  border-radius: 3px; font-size: 10px; font-weight: 600;
  margin-left: 8px; vertical-align: middle;
}
.grid-2 {
  display: grid; grid-template-columns: 1fr 1fr; gap: 24px;
  margin-top: 16px;
}
@media (max-width: 640px) {
  .grid-2 { grid-template-columns: 1fr; }
  .briefing-container { padding: 16px 12px 48px; }
  .hero { padding: 24px 20px; }
  .hero h1 { font-size: 24px; }
  .card { padding: 18px 16px; }
  .event { flex-direction: column; gap: 4px; }
  .event .time { min-width: 0; }
}
.news { padding-left: 20px; margin: 8px 0; }
.news li { margin-bottom: 10px; font-size: 14px; }
.weather {
  display: flex; gap: 24px; align-items: center;
  background: linear-gradient(135deg, #e3eef9 0%, #f3e6df 100%);
  padding: 18px 22px; border-radius: 10px;
}
.weather .temp { font-size: 32px; font-weight: 600; }
.weather .sep { color: var(--muted); margin: 0 4px; font-weight: 400; }
.weather .conditions { font-size: 14px; color: var(--muted); margin-top: 4px; }
.weather .weather-rec { flex: 1; font-size: 14px; }
@media (max-width: 640px) { .weather { flex-direction: column; align-items: flex-start; } }
.todos { padding-left: 22px; margin: 8px 0; }
.todos li { margin-bottom: 10px; font-size: 14px; padding: 6px 10px; border-radius: 6px; }
.todos li.todo-critical { background: var(--red-bg); }
.todos li.todo-important { background: var(--amber-bg); }
.footer {
  text-align: center; color: var(--muted); font-size: 12px;
  margin-top: 32px; padding-top: 16px; border-top: 1px solid var(--line);
}
</style>
</head>

      <button type="submit">Desbloquear</button>
      <div class="error" id="err"></div>

  </div>
</div>

function tryDecrypt(pwd) {
  try {
    const decrypted = CryptoJS.AES.decrypt(CIPHERTEXT, pwd);
    const text = decrypted.toString(CryptoJS.enc.Utf8);
    if (!text || text.length < 100) return null;
    return text;
  } catch (e) { return null; }
}

document.getElementById('lockForm').addEventListener('submit', function(e) {
  e.preventDefault();
  const pwd = document.getElementById('pwd').value;
  const err = document.getElementById('err');
  err.textContent = '';
  const html = tryDecrypt(pwd);
  if (!html) {
    err.textContent = 'Contraseña incorrecta.';
    document.getElementById('pwd').select();
    return;
  }
  document.getElementById('lock').style.display = 'none';
  const c = document.getElementById('content');
  c.innerHTML = html;
  c.style.display = 'block';
});
</script>
